<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 850" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#007bff"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#dc3545"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#28a745"/></marker>
  </defs>
  <rect width="750" height="850" fill="#ffffff" rx="8"/>
  <text x="375" y="32" text-anchor="middle" fill="#1a1a2e" font-size="17" font-weight="bold">M7 关注管理流程图</text>

  <ellipse cx="375" cy="62" rx="55" ry="18" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="375" y="68" text-anchor="middle" fill="#155724" font-size="14" font-weight="bold">开　始</text>
  <line x1="375" y1="80" x2="375" y2="105" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="250" y="108" width="250" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="375" y="131" text-anchor="middle" fill="#0056b3" font-size="14">收到关注请求</text>
  <line x1="375" y1="144" x2="375" y2="170" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <polygon points="375,176 465,216 375,256 285,216" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="375" y="212" text-anchor="middle" fill="#856404" font-size="14" font-weight="bold">操作类型？</text>
  <text x="300" y="234" text-anchor="middle" fill="#856404" font-size="12">POST 关注</text>
  <text x="450" y="234" text-anchor="middle" fill="#856404" font-size="12">DELETE 取消</text>

  <!-- POST -->
  <line x1="320" y1="230" x2="175" y2="290" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="80" y="290" width="190" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="175" y="313" text-anchor="middle" fill="#0056b3" font-size="13">校验登录状态</text>
  <line x1="175" y1="326" x2="175" y2="352" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <polygon points="175,358 240,396 175,434 110,396" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="175" y="394" text-anchor="middle" fill="#856404" font-size="12">已关注？</text>
  <text x="135" y="414" text-anchor="middle" fill="#856404" font-size="11">是</text>
  <text x="215" y="414" text-anchor="middle" fill="#856404" font-size="11">否</text>

  <line x1="110" y1="396" x2="55" y2="396" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="10" y="384" width="45" height="24" rx="4" fill="#f8d7da" stroke="#dc3545" stroke-width="1"/>
  <text x="32" y="401" text-anchor="middle" fill="#721c24" font-size="10">重复</text>

  <line x1="240" y1="396" x2="300" y2="450" stroke="#28a745" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="240" y="450" width="170" height="36" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="325" y="473" text-anchor="middle" fill="#155724" font-size="13">插入 follow 记录</text>
  <line x1="325" y1="486" x2="325" y2="515" stroke="#007bff" stroke-width="1.5"/>
  <rect x="240" y="518" width="170" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="325" y="541" text-anchor="middle" fill="#0056b3" font-size="13">follower_count++</text>

  <!-- DELETE -->
  <line x1="430" y1="230" x2="580" y2="290" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="485" y="290" width="190" height="36" rx="6" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="580" y="313" text-anchor="middle" fill="#721c24" font-size="13">校验登录状态</text>
  <line x1="580" y1="326" x2="580" y2="352" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>

  <polygon points="580,358 645,396 580,434 515,396" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="580" y="394" text-anchor="middle" fill="#856404" font-size="12">未关注？</text>
  <text x="540" y="414" text-anchor="middle" fill="#856404" font-size="11">是</text>
  <text x="620" y="414" text-anchor="middle" fill="#856404" font-size="11">否</text>

  <line x1="515" y1="396" x2="470" y2="396" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="425" y="384" width="45" height="24" rx="4" fill="#f8d7da" stroke="#dc3545" stroke-width="1"/>
  <text x="447" y="401" text-anchor="middle" fill="#721c24" font-size="10">未关注</text>

  <line x1="645" y1="396" x2="645" y2="450" stroke="#28a745" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="570" y="450" width="150" height="36" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="645" y="473" text-anchor="middle" fill="#155724" font-size="13">删除 follow 记录</text>
  <line x1="645" y1="486" x2="645" y2="518" stroke="#007bff" stroke-width="1.5"/>
  <rect x="570" y="518" width="150" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="645" y="541" text-anchor="middle" fill="#0056b3" font-size="13">follower_count--</text>

  <!-- 汇合 -->
  <line x1="325" y1="554" x2="325" y2="580" stroke="#007bff" stroke-width="1.5"/>
  <line x1="645" y1="554" x2="645" y2="580" stroke="#007bff" stroke-width="1.5"/>
  <line x1="325" y1="580" x2="375" y2="580" stroke="#007bff" stroke-width="1.5"/>
  <line x1="375" y1="580" x2="645" y2="580" stroke="#007bff" stroke-width="1.5"/>

  <line x1="375" y1="580" x2="375" y2="615" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="270" y="618" width="210" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="375" y="641" text-anchor="middle" fill="#0056b3" font-size="14">返回操作结果</text>
  <line x1="375" y1="654" x2="375" y2="680" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 查询关注列表 -->
  <polygon points="375,686 445,720 375,754 305,720" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="375" y="716" text-anchor="middle" fill="#856404" font-size="12">查询列表？</text>
  <text x="335" y="734" text-anchor="middle" fill="#856404" font-size="11">GET /users/{id}/follows</text>

  <line x1="305" y1="720" x2="175" y2="770" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="80" y="770" width="190" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="175" y="793" text-anchor="middle" fill="#0056b3" font-size="13">返回 CatItem 列表</text>

  <line x1="445" y1="720" x2="600" y2="770" stroke="#28a745" stroke-width="1.5" marker-end="url(#ag)"/>
  <ellipse cx="600" cy="792" rx="55" ry="18" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="600" y="798" text-anchor="middle" fill="#155724" font-size="14" font-weight="bold">结　束</text>
</svg>