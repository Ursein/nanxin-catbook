<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 850" font-family="Microsoft YaHei, SimHei, sans-serif">
  <rect width="850" height="850" fill="#ffffff" rx="8"/>
  <text x="425" y="35" text-anchor="middle" fill="#1a1a2e" font-size="18" font-weight="bold">M1 用户管理流程图</text>

  <!-- Start -->
  <ellipse cx="425" cy="65" rx="55" ry="20" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="425" y="71" text-anchor="middle" fill="#155724" font-size="14" font-weight="bold">开　始</text>
  <line x1="425" y1="85" x2="425" y2="108" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#007bff"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#dc3545"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#28a745"/></marker>
  </defs>

  <!-- 登录/注册页面 -->
  <rect x="265" y="110" width="320" height="38" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="425" y="134" text-anchor="middle" fill="#0056b3" font-size="14">进入登录 / 注册页面</text>
  <line x1="425" y1="148" x2="425" y2="175" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 已有账号？ -->
  <polygon points="425,180 515,220 425,260 335,220" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="425" y="216" text-anchor="middle" fill="#856404" font-size="14" font-weight="bold">已有账号？</text>
  <text x="375" y="238" text-anchor="middle" fill="#856404" font-size="12">否（注册）</text>
  <text x="480" y="238" text-anchor="middle" fill="#856404" font-size="12">是（登录）</text>

  <!-- 左：注册 -->
  <line x1="375" y1="235" x2="175" y2="295" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="80" y="295" width="190" height="38" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="175" y="319" text-anchor="middle" fill="#0056b3" font-size="13">填写用户名 + 密码</text>
  <line x1="175" y1="333" x2="175" y2="360" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <polygon points="175,366 240,406 175,446 110,406" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="175" y="402" text-anchor="middle" fill="#856404" font-size="13">校验通过？</text>

  <line x1="110" y1="406" x2="50" y2="406" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="76" y="400" fill="#dc3545" font-size="12">否</text>
  <line x1="50" y1="406" x2="50" y2="314" stroke="#dc3545" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="50" y1="314" x2="80" y2="314" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="35" y="365" fill="#dc3545" font-size="11" transform="rotate(-90,35,365)">重新填写</text>

  <line x1="240" y1="406" x2="320" y2="455" stroke="#28a745" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="235" y="455" width="170" height="38" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="320" y="477" text-anchor="middle" fill="#155724" font-size="13">创建用户记录</text>
  <text x="320" y="490" text-anchor="middle" fill="#6c757d" font-size="10">INSERT INTO user</text>
  <line x1="320" y1="493" x2="320" y2="515" stroke="#007bff" stroke-width="1.5"/>

  <!-- 右：登录 -->
  <line x1="478" y1="235" x2="620" y2="295" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="530" y="295" width="180" height="38" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="620" y="319" text-anchor="middle" fill="#0056b3" font-size="13">输入用户名 + 密码</text>
  <line x1="620" y1="333" x2="620" y2="360" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <polygon points="620,366 685,406 620,446 555,406" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="620" y="402" text-anchor="middle" fill="#856404" font-size="13">校验通过？</text>

  <line x1="685" y1="406" x2="740" y2="406" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="710" y="400" fill="#dc3545" font-size="12">否</text>
  <rect x="745" y="392" width="78" height="28" rx="4" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="784" y="411" text-anchor="middle" fill="#721c24" font-size="12">提示错误</text>
  <line x1="823" y1="406" x2="823" y2="314" stroke="#dc3545" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="823" y1="314" x2="710" y2="314" stroke="#dc3545" stroke-width="2" marker-end="url(#ar)"/>
  <rect x="808" y="352" width="30" height="28" rx="4" fill="#dc3545"/>
  <text x="823" y="372" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">重试</text>

  <line x1="620" y1="446" x2="620" y2="475" stroke="#28a745" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="525" y="475" width="190" height="38" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="620" y="497" text-anchor="middle" fill="#155724" font-size="13">生成 JWT Token</text>
  <text x="620" y="510" text-anchor="middle" fill="#6c757d" font-size="10">存入 localStorage</text>
  <line x1="620" y1="513" x2="620" y2="520" stroke="#007bff" stroke-width="1.5"/>

  <!-- 汇合 -->
  <line x1="320" y1="515" x2="425" y2="515" stroke="#007bff" stroke-width="1.5"/>
  <line x1="425" y1="515" x2="620" y2="520" stroke="#007bff" stroke-width="1.5"/>
  <line x1="425" y1="515" x2="425" y2="545" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="290" y="548" width="270" height="38" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="425" y="572" text-anchor="middle" fill="#0056b3" font-size="14">进入系统主页</text>
  <line x1="425" y1="586" x2="425" y2="615" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <polygon points="425,620 500,658 425,696 350,658" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="425" y="654" text-anchor="middle" fill="#856404" font-size="13">Token 有效？</text>
  <text x="380" y="674" text-anchor="middle" fill="#856404" font-size="12">无效</text>
  <text x="475" y="674" text-anchor="middle" fill="#856404" font-size="12">有效</text>

  <line x1="350" y1="658" x2="190" y2="658" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="110" y="644" width="80" height="28" rx="4" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="150" y="663" text-anchor="middle" fill="#721c24" font-size="12">重定向登录页</text>
  <line x1="115" y1="672" x2="115" y2="770" stroke="#dc3545" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="100" y="725" fill="#dc3545" font-size="11" transform="rotate(-90,100,725)">重新登录</text>

  <line x1="500" y1="658" x2="610" y2="720" stroke="#28a745" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="525" y="720" width="170" height="38" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="610" y="742" text-anchor="middle" fill="#155724" font-size="13">访问受保护资源</text>
  <text x="610" y="755" text-anchor="middle" fill="#6c757d" font-size="10">返回 JSON 数据</text>
  <line x1="610" y1="758" x2="610" y2="785" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <ellipse cx="610" cy="810" rx="55" ry="20" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="610" y="816" text-anchor="middle" fill="#155724" font-size="14" font-weight="bold">结　束</text>
</svg>