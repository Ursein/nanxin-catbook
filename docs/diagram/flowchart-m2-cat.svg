<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 800" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#007bff"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#dc3545"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#28a745"/></marker>
  </defs>
  <rect width="750" height="800" fill="#ffffff" rx="8"/>
  <text x="375" y="35" text-anchor="middle" fill="#1a1a2e" font-size="17" font-weight="bold">M2 猫咪管理流程图</text>

  <!-- Start -->
  <ellipse cx="375" cy="65" rx="55" ry="20" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="375" y="71" text-anchor="middle" fill="#155724" font-size="14" font-weight="bold">开　始</text>
  <line x1="375" y1="85" x2="375" y2="110" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="250" y="112" width="250" height="38" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="375" y="136" text-anchor="middle" fill="#0056b3" font-size="14">接收前端请求</text>
  <line x1="375" y1="150" x2="375" y2="175" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="270" y="178" width="210" height="38" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="375" y="202" text-anchor="middle" fill="#0056b3" font-size="14">校验登录权限</text>
  <line x1="375" y1="216" x2="375" y2="240" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <polygon points="375,246 460,286 375,326 290,286" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="375" y="282" text-anchor="middle" fill="#856404" font-size="14" font-weight="bold">路由选择</text>
  <text x="300" y="300" text-anchor="middle" fill="#856404" font-size="11">POST 创建</text>
  <text x="450" y="300" text-anchor="middle" fill="#856404" font-size="11">GET / GET/{id}</text>

  <!-- POST 分支 -->
  <line x1="320" y1="300" x2="140" y2="360" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="45" y="360" width="190" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="140" y="383" text-anchor="middle" fill="#0056b3" font-size="13">POST /cats — 创建猫咪</text>
  <line x1="140" y1="396" x2="140" y2="420" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>
  <polygon points="140,426 200,462 140,498 80,462" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="140" y="458" text-anchor="middle" fill="#856404" font-size="12">参数校验</text>
  <line x1="80" y1="462" x2="35" y2="462" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="50" y="456" fill="#dc3545" font-size="11">无效</text>
  <rect x="6" y="450" width="30" height="24" rx="4" fill="#f8d7da" stroke="#dc3545" stroke-width="1"/>
  <text x="21" y="467" text-anchor="middle" fill="#721c24" font-size="10">400</text>

  <line x1="200" y1="462" x2="310" y2="520" stroke="#28a745" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="215" y="520" width="190" height="36" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="310" y="543" text-anchor="middle" fill="#155724" font-size="13">写入数据库 INSERT</text>
  <line x1="310" y1="556" x2="310" y2="580" stroke="#007bff" stroke-width="1.5"/>

  <!-- GET 分支 -->
  <line x1="430" y1="300" x2="560" y2="360" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="475" y="360" width="170" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="560" y="383" text-anchor="middle" fill="#0056b3" font-size="13">GET 列表/详情/搜索</text>
  <line x1="560" y1="396" x2="560" y2="420" stroke="#007bff" stroke-width="1.5"/>
  <rect x="490" y="422" width="140" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="560" y="445" text-anchor="middle" fill="#0056b3" font-size="13">参数校验+查询</text>
  <line x1="560" y1="458" x2="560" y2="480" stroke="#007bff" stroke-width="1.5"/>
  <polygon points="560,486 618,520 560,554 502,520" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="560" y="516" text-anchor="middle" fill="#856404" font-size="12">有结果？</text>
  <line x1="502" y1="520" x2="460" y2="520" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>
  <text x="475" y="514" fill="#dc3545" font-size="11">无</text>
  <rect x="450" y="506" width="30" height="28" rx="4" fill="#f8d7da" stroke="#dc3545" stroke-width="1"/>
  <text x="465" y="525" text-anchor="middle" fill="#721c24" font-size="10">[]</text>

  <line x1="618" y1="520" x2="640" y2="560" stroke="#28a745" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="640" y="540" width="90" height="36" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="685" y="563" text-anchor="middle" fill="#155724" font-size="13">封装结果</text>
  <line x1="685" y1="576" x2="685" y2="610" stroke="#007bff" stroke-width="1.5"/>
  <line x1="640" y1="610" x2="450" y2="610" stroke="#007bff" stroke-width="1.5"/>

  <!-- 汇合 -->
  <line x1="310" y1="580" x2="375" y2="580" stroke="#007bff" stroke-width="1.5"/>
  <line x1="375" y1="580" x2="450" y2="610" stroke="#007bff" stroke-width="1.5"/>
  <line x1="375" y1="580" x2="375" y2="618" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 软删除分支从上往下独立 -->
  <polygon points="375,624 460,664 375,704 290,664" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="375" y="660" text-anchor="middle" fill="#856404" font-size="13">其他操作？</text>
  <text x="320" y="680" text-anchor="middle" fill="#856404" font-size="11">PUT 删除</text>

  <line x1="320" y1="678" x2="180" y2="730" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="85" y="730" width="190" height="36" rx="6" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="180" y="753" text-anchor="middle" fill="#721c24" font-size="13">PUT 软删除猫咪</text>

  <line x1="375" y1="704" x2="375" y2="740" stroke="#007bff" stroke-width="1.5"/>
  <rect x="270" y="740" width="210" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="375" y="763" text-anchor="middle" fill="#0056b3" font-size="14">返回 JSON 响应 → 结束</text>
</svg>