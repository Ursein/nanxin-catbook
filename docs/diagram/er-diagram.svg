<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10" fill="none" stroke="#64748b" stroke-width="1.2"/>
    </marker>
  </defs>
  <rect width="1200" height="950" fill="#ffffff"/>

  <text x="600" y="35" fill="#1e293b" font-size="18" font-weight="700" text-anchor="middle">数据库 E-R 图 — 南信猫友记</text>
  <text x="600" y="55" fill="#64748b" font-size="10" text-anchor="middle">8 张实体表 · PK=主键  FK=外键  UK=唯一约束</text>

  <!-- ============ ENTITIES ============ -->
  <!-- Entity box: dark header + light body -->

  <!-- Helper: entity macro using rect + text -->

  <!-- Row 1: Core entities -->
  <!-- user (left) -->
  <rect x="60" y="80" width="210" height="175" rx="6" fill="#f8fafc" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="60" y="80" width="210" height="30" rx="6" fill="#0e3a5c" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="165" y="99" fill="#22d3ee" font-size="12" font-weight="700" text-anchor="middle">user（用户表）</text>
  <text x="70" y="125" fill="#475569" font-size="9.5">[PK] id: BIGINT</text>
  <text x="70" y="143" fill="#475569" font-size="9.5">username: VARCHAR(50)</text>
  <text x="70" y="161" fill="#475569" font-size="9.5">password: VARCHAR(255)</text>
  <text x="70" y="179" fill="#475569" font-size="9.5">role: ENUM (USER/VERIFIED/ADMIN)</text>
  <text x="70" y="197" fill="#475569" font-size="9.5">nickname / email / avatar</text>
  <text x="70" y="215" fill="#475569" font-size="9.5">status / created_at / updated_at</text>
  <text x="70" y="236" fill="#22d3ee" font-size="8">基础数据</text>

  <!-- cat (center) -->
  <rect x="360" y="80" width="240" height="240" rx="6" fill="#f8fafc" stroke="#34d399" stroke-width="1.5"/>
  <rect x="360" y="80" width="240" height="30" rx="6" fill="#0a3d2e" stroke="#34d399" stroke-width="1.5"/>
  <text x="480" y="99" fill="#34d399" font-size="12" font-weight="700" text-anchor="middle">cat（猫咪表）</text>
  <text x="370" y="125" fill="#475569" font-size="9.5">[PK] id: BIGINT</text>
  <text x="370" y="143" fill="#475569" font-size="9.5">name / nickname / gender</text>
  <text x="370" y="161" fill="#475569" font-size="9.5">colour_tags / personality_tags</text>
  <text x="370" y="179" fill="#475569" font-size="9.5">location_area / location_detail</text>
  <text x="370" y="197" fill="#475569" font-size="9.5">status / sterilized / weight</text>
  <text x="370" y="215" fill="#475569" font-size="9.5">[FK] creator_id → user.id</text>
  <text x="370" y="233" fill="#475569" font-size="9.5">[FK] cover_photo_id → photo.id</text>
  <text x="370" y="251" fill="#475569" font-size="9.5">[FK] father_id / mother_id → cat.id</text>
  <text x="370" y="269" fill="#475569" font-size="9.5">like_count / follow_count</text>
  <text x="370" y="287" fill="#475569" font-size="9.5">avg_rating / avg_r1~r5</text>
  <text x="370" y="308" fill="#34d399" font-size="8">基础数据</text>

  <!-- photo (right) -->
  <rect x="700" y="80" width="220" height="175" rx="6" fill="#f8fafc" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="700" y="80" width="220" height="30" rx="6" fill="#3b1f6e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="810" y="99" fill="#a78bfa" font-size="12" font-weight="700" text-anchor="middle">photo（照片表）</text>
  <text x="710" y="125" fill="#475569" font-size="9.5">[PK] id: BIGINT</text>
  <text x="710" y="143" fill="#475569" font-size="9.5">[FK] cat_id → cat.id</text>
  <text x="710" y="161" fill="#475569" font-size="9.5">[FK] uploader_id → user.id</text>
  <text x="710" y="179" fill="#475569" font-size="9.5">file_path / description</text>
  <text x="710" y="197" fill="#475569" font-size="9.5">status (PENDING/APPROVED/REJECTED)</text>
  <text x="710" y="215" fill="#475569" font-size="9.5">[FK] reviewer_id → user.id</text>
  <text x="710" y="236" fill="#a78bfa" font-size="8">基础数据</text>

  <!-- Row 2: comment + activity_log -->
  <!-- comment (left) -->
  <rect x="60" y="390" width="210" height="145" rx="6" fill="#f8fafc" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="60" y="390" width="210" height="30" rx="6" fill="#5c4a0a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="165" y="409" fill="#fbbf24" font-size="12" font-weight="700" text-anchor="middle">comment（评论表）</text>
  <text x="70" y="435" fill="#475569" font-size="9.5">[PK] id: BIGINT</text>
  <text x="70" y="453" fill="#475569" font-size="9.5">[FK] cat_id → cat.id</text>
  <text x="70" y="471" fill="#475569" font-size="9.5">[FK] user_id → user.id</text>
  <text x="70" y="489" fill="#475569" font-size="9.5">content: TEXT</text>
  <text x="70" y="507" fill="#475569" font-size="9.5">created_at</text>
  <text x="70" y="525" fill="#fbbf24" font-size="8">基础数据</text>

  <!-- activity_log (right) -->
  <rect x="700" y="390" width="220" height="145" rx="6" fill="#f8fafc" stroke="#fb923c" stroke-width="1.5"/>
  <rect x="700" y="390" width="220" height="30" rx="6" fill="#5c2d0a" stroke="#fb923c" stroke-width="1.5"/>
  <text x="810" y="409" fill="#fb923c" font-size="12" font-weight="700" text-anchor="middle">activity_log（日志表）</text>
  <text x="710" y="435" fill="#475569" font-size="9.5">[PK] id: BIGINT</text>
  <text x="710" y="453" fill="#475569" font-size="9.5">[FK] user_id → user.id</text>
  <text x="710" y="471" fill="#475569" font-size="9.5">[FK] cat_id → cat.id</text>
  <text x="710" y="489" fill="#475569" font-size="9.5">action: ENUM</text>
  <text x="710" y="507" fill="#475569" font-size="9.5">extra_info / created_at</text>
  <text x="710" y="525" fill="#fb923c" font-size="8">日志数据</text>

  <!-- Row 3: Interaction tables -->
  <!-- photo_like (left) -->
  <rect x="60" y="630" width="220" height="130" rx="6" fill="#f8fafc" stroke="#f472b6" stroke-width="1.5"/>
  <rect x="60" y="630" width="220" height="30" rx="6" fill="#5c1a3e" stroke="#f472b6" stroke-width="1.5"/>
  <text x="170" y="649" fill="#f472b6" font-size="12" font-weight="700" text-anchor="middle">photo_like（点赞表）</text>
  <text x="70" y="675" fill="#475569" font-size="9.5">[PK] id: BIGINT</text>
  <text x="70" y="693" fill="#475569" font-size="9.5">[FK] photo_id → photo.id</text>
  <text x="70" y="711" fill="#475569" font-size="9.5">[FK] user_id → user.id</text>
  <text x="70" y="729" fill="#f472b6" font-size="9.5">UK(photo_id, user_id)</text>
  <text x="70" y="747" fill="#475569" font-size="9.5">created_at</text>

  <!-- cat_follow (center) -->
  <rect x="370" y="630" width="220" height="130" rx="6" fill="#f8fafc" stroke="#34d399" stroke-width="1.5"/>
  <rect x="370" y="630" width="220" height="30" rx="6" fill="#0a3d2e" stroke="#34d399" stroke-width="1.5"/>
  <text x="480" y="649" fill="#34d399" font-size="12" font-weight="700" text-anchor="middle">cat_follow（关注表）</text>
  <text x="380" y="675" fill="#475569" font-size="9.5">[PK] id: BIGINT</text>
  <text x="380" y="693" fill="#475569" font-size="9.5">[FK] user_id → user.id</text>
  <text x="380" y="711" fill="#475569" font-size="9.5">[FK] cat_id → cat.id</text>
  <text x="380" y="729" fill="#34d399" font-size="9.5">UK(user_id, cat_id)</text>
  <text x="380" y="747" fill="#475569" font-size="9.5">created_at</text>

  <!-- cat_rating (right) -->
  <rect x="700" y="630" width="220" height="130" rx="6" fill="#f8fafc" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="700" y="630" width="220" height="30" rx="6" fill="#5c420a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="810" y="649" fill="#f59e0b" font-size="12" font-weight="700" text-anchor="middle">cat_rating（评分表）</text>
  <text x="710" y="675" fill="#475569" font-size="9.5">[PK] id: BIGINT</text>
  <text x="710" y="693" fill="#475569" font-size="9.5">[FK] cat_id → cat.id</text>
  <text x="710" y="711" fill="#475569" font-size="9.5">[FK] user_id → user.id</text>
  <text x="710" y="729" fill="#475569" font-size="9.5">r1~r5: INT (1-5)</text>
  <text x="710" y="747" fill="#f59e0b" font-size="9.5">UK(user_id, cat_id)</text>

  <!-- ============ RELATIONSHIPS ============ -->

  <!-- === user → cat (1:N via creator_id) === -->
  <line x1="270" y1="160" x2="355" y2="170" stroke="#64748b" stroke-width="1.5"/>
  <text x="300" y="155" fill="#22d3ee" font-size="10" font-weight="600">1</text>
  <text x="335" y="173" fill="#34d399" font-size="10" font-weight="600">N</text>

  <!-- === user → comment (1:N via user_id) === -->
  <line x1="165" y1="255" x2="165" y2="385" stroke="#64748b" stroke-width="1.5"/>
  <text x="180" y="310" fill="#22d3ee" font-size="10" font-weight="600">1</text>
  <text x="180" y="380" fill="#fbbf24" font-size="10" font-weight="600">N</text>

  <!-- === user → photo_like (1:N via user_id) === -->
  <line x1="165" y1="535" x2="165" y2="625" stroke="#64748b" stroke-width="1.5"/>
  <text x="180" y="580" fill="#22d3ee" font-size="10" font-weight="600">1</text>
  <text x="180" y="620" fill="#f472b6" font-size="10" font-weight="600">N</text>

  <!-- === user → cat_follow (1:N via user_id, diagonal) === -->
  <line x1="270" y1="230" x2="400" y2="625" stroke="#64748b" stroke-width="1.5"/>
  <text x="320" y="420" fill="#22d3ee" font-size="10" font-weight="600">1</text>
  <text x="390" y="615" fill="#34d399" font-size="10" font-weight="600">N</text>

  <!-- === user → cat_rating (1:N via user_id, diagonal) === -->
  <line x1="270" y1="240" x2="710" y2="700" stroke="#64748b" stroke-width="1.5"/>
  <text x="480" y="460" fill="#22d3ee" font-size="10" font-weight="600">1</text>
  <text x="700" y="695" fill="#f59e0b" font-size="10" font-weight="600">N</text>

  <!-- === user → activity_log (1:N via user_id, diagonal) === -->
  <line x1="270" y1="245" x2="700" y2="440" stroke="#64748b" stroke-width="1.5"/>
  <text x="480" y="340" fill="#22d3ee" font-size="10" font-weight="600">1</text>
  <text x="690" y="435" fill="#fb923c" font-size="10" font-weight="600">N</text>

  <!-- === user → photo (uploader_id) === -->
  <line x1="270" y1="180" x2="695" y2="190" stroke="#64748b" stroke-width="1.5"/>
  <text x="520" y="178" fill="#22d3ee" font-size="9">1</text>
  <text x="650" y="192" fill="#a78bfa" font-size="9">N</text>

  <!-- === cat → photo (1:N via cat_id) === -->
  <line x1="600" y1="190" x2="695" y2="185" stroke="#64748b" stroke-width="1.5"/>
  <text x="640" y="185" fill="#34d399" font-size="10" font-weight="600">1</text>
  <text x="680" y="182" fill="#a78bfa" font-size="10" font-weight="600">N</text>

  <!-- === cat → comment (1:N via cat_id) === -->
  <line x1="450" y1="320" x2="165" y2="385" stroke="#64748b" stroke-width="1.5"/>
  <text x="320" y="340" fill="#34d399" font-size="10" font-weight="600">1</text>
  <text x="200" y="380" fill="#fbbf24" font-size="10" font-weight="600">N</text>

  <!-- === cat → cat_follow (1:N via cat_id) === -->
  <line x1="480" y1="320" x2="480" y2="625" stroke="#64748b" stroke-width="1.5"/>
  <text x="495" y="470" fill="#34d399" font-size="10" font-weight="600">1</text>
  <text x="495" y="620" fill="#34d399" font-size="10" font-weight="600">N</text>

  <!-- === cat → cat_rating (1:N via cat_id) === -->
  <line x1="530" y1="320" x2="790" y2="625" stroke="#64748b" stroke-width="1.5"/>
  <text x="660" y="470" fill="#34d399" font-size="10" font-weight="600">1</text>
  <text x="785" y="620" fill="#f59e0b" font-size="10" font-weight="600">N</text>

  <!-- === cat → activity_log (1:N via cat_id) === -->
  <line x1="580" y1="320" x2="700" y2="385" stroke="#64748b" stroke-width="1.5"/>
  <text x="640" y="345" fill="#34d399" font-size="10" font-weight="600">1</text>
  <text x="690" y="380" fill="#fb923c" font-size="10" font-weight="600">N</text>

  <!-- === cat self-reference: father_id/mother_id === -->
  <path d="M 600 200 Q 670 130 600 130" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="640" y="145" fill="#34d399" font-size="9">N</text>
  <text x="640" y="125" fill="#34d399" font-size="9">1</text>

  <!-- === photo → photo_like (1:N via photo_id) === -->
  <line x1="760" y1="255" x2="200" y2="625" stroke="#64748b" stroke-width="1.5"/>
  <text x="380" y="430" fill="#a78bfa" font-size="10" font-weight="600">1</text>
  <text x="230" y="618" fill="#f472b6" font-size="10" font-weight="600">N</text>

  <!-- ============ LEGEND ============ -->
  <rect x="880" y="700" width="280" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="1020" y="720" fill="#475569" font-size="11" font-weight="600" text-anchor="middle">图例</text>
  <rect x="895" y="732" width="14" height="14" rx="2" fill="#0e3a5c" stroke="#22d3ee" stroke-width="1"/>
  <text x="920" y="744" fill="#475569" font-size="9">基础数据表</text>
  <rect x="895" y="754" width="14" height="14" rx="2" fill="#5c2d0a" stroke="#fb923c" stroke-width="1"/>
  <text x="920" y="766" fill="#475569" font-size="9">日志数据表</text>
  <rect x="895" y="776" width="14" height="14" rx="2" fill="#5c1a3e" stroke="#f472b6" stroke-width="1"/>
  <text x="920" y="788" fill="#475569" font-size="9">互动数据表</text>
</svg>
