<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 950">
  

  <defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="none" stroke="#f1f5f9" stroke-width="0.5"/></pattern></defs><rect width="100%" height="100%" fill="#ffffff"/>
  <rect width="1300" height="950" fill="#ffffff"/>
  <rect width="1300" height="950" fill="url(#grid)"/>

  <text x="650" y="35" fill="#1e293b" font-size="16" font-weight="700" text-anchor="middle">数据库 E-R 图 — 南信猫友记</text>
  <text x="650" y="55" fill="#475569" font-size="9" text-anchor="middle">展示 8 张数据库实体表的属性与关系</text>

  <!-- ===== ENTITIES (rectangles) ===== -->

  <!-- Entity style: header row + attribute rows -->

  <!-- user (top-left) -->
  <rect x="50" y="80" width="200" height="140" rx="6" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5"/>
  <rect x="50" y="80" width="200" height="28" rx="6" fill="#0e3a5c" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="150" y="98" fill="#22d3ee" font-size="11" font-weight="700" text-anchor="middle">user（用户表）</text>
  <text x="60" y="122" fill="#475569" font-size="9">[PK] id: BIGINT</text>
  <text x="60" y="138" fill="#475569" font-size="9">username: VARCHAR(50)</text>
  <text x="60" y="154" fill="#475569" font-size="9">password: VARCHAR(255)</text>
  <text x="60" y="170" fill="#475569" font-size="9">role: ENUM</text>
  <text x="60" y="186" fill="#475569" font-size="9">nickname / email / avatar</text>
  <text x="60" y="202" fill="#475569" font-size="9">status / created_at / updated_at</text>

  <!-- cat (top-center) -->
  <rect x="310" y="80" width="220" height="200" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <rect x="310" y="80" width="220" height="28" rx="6" fill="#0a3d2e" stroke="#34d399" stroke-width="1.5"/>
  <text x="420" y="98" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">cat（猫咪表）</text>
  <text x="320" y="122" fill="#475569" font-size="9">[PK] id: BIGINT</text>
  <text x="320" y="138" fill="#475569" font-size="9">name / nickname / gender</text>
  <text x="320" y="154" fill="#475569" font-size="9">colour_tags / personality_tags</text>
  <text x="320" y="170" fill="#475569" font-size="9">location_area / location_detail</text>
  <text x="320" y="186" fill="#475569" font-size="9">status / sterilized</text>
  <text x="320" y="202" fill="#475569" font-size="9">[FK] creator_id → user.id</text>
  <text x="320" y="218" fill="#475569" font-size="9">[FK] cover_photo_id → photo.id</text>
  <text x="320" y="234" fill="#475569" font-size="9">[FK] father_id / mother_id → cat.id</text>
  <text x="320" y="250" fill="#475569" font-size="9">like_count / follow_count</text>
  <text x="320" y="266" fill="#475569" font-size="9">avg_rating / avg_r1~r5</text>

  <!-- photo (right) -->
  <rect x="600" y="80" width="200" height="150" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="600" y="80" width="200" height="28" rx="6" fill="#3b1f6e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="700" y="98" fill="#a78bfa" font-size="11" font-weight="700" text-anchor="middle">photo（照片表）</text>
  <text x="610" y="122" fill="#475569" font-size="9">[PK] id: BIGINT</text>
  <text x="610" y="138" fill="#475569" font-size="9">[FK] cat_id → cat.id</text>
  <text x="610" y="154" fill="#475569" font-size="9">[FK] uploader_id → user.id</text>
  <text x="610" y="170" fill="#475569" font-size="9">file_path / description</text>
  <text x="610" y="186" fill="#475569" font-size="9">status (PENDING/APPROVED/REJECTED)</text>
  <text x="610" y="202" fill="#475569" font-size="9">[FK] reviewer_id → user.id</text>
  <text x="610" y="218" fill="#475569" font-size="9">like_count / created_at</text>

  <!-- comment (left-middle) -->
  <rect x="50" y="310" width="180" height="130" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="50" y="310" width="180" height="28" rx="6" fill="#5c4a0a" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="140" y="328" fill="#fbbf24" font-size="11" font-weight="700" text-anchor="middle">comment（评论表）</text>
  <text x="60" y="352" fill="#475569" font-size="9">[PK] id: BIGINT</text>
  <text x="60" y="368" fill="#475569" font-size="9">[FK] cat_id → cat.id</text>
  <text x="60" y="384" fill="#475569" font-size="9">[FK] user_id → user.id</text>
  <text x="60" y="400" fill="#475569" font-size="9">content: TEXT</text>
  <text x="60" y="416" fill="#475569" font-size="9">created_at</text>

  <!-- activity_log (right-middle) -->
  <rect x="850" y="310" width="200" height="130" rx="6" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <rect x="850" y="310" width="200" height="28" rx="6" fill="#5c2d0a" stroke="#fb923c" stroke-width="1.5"/>
  <text x="950" y="328" fill="#fb923c" font-size="11" font-weight="700" text-anchor="middle">activity_log（日志表）</text>
  <text x="860" y="352" fill="#475569" font-size="9">[PK] id: BIGINT</text>
  <text x="860" y="368" fill="#475569" font-size="9">[FK] user_id → user.id</text>
  <text x="860" y="384" fill="#475569" font-size="9">[FK] cat_id → cat.id</text>
  <text x="860" y="400" fill="#475569" font-size="9">action: ENUM</text>
  <text x="860" y="416" fill="#475569" font-size="9">extra_info / created_at</text>

  <!-- photo_like (bottom-left) -->
  <rect x="50" y="530" width="200" height="115" rx="6" fill="#1e293b" stroke="#f472b6" stroke-width="1.5"/>
  <rect x="50" y="530" width="200" height="28" rx="6" fill="#5c1a3e" stroke="#f472b6" stroke-width="1.5"/>
  <text x="150" y="548" fill="#f472b6" font-size="11" font-weight="700" text-anchor="middle">photo_like（点赞表）</text>
  <text x="60" y="572" fill="#475569" font-size="9">[PK] id: BIGINT</text>
  <text x="60" y="588" fill="#475569" font-size="9">[FK] photo_id → photo.id</text>
  <text x="60" y="604" fill="#475569" font-size="9">[FK] user_id → user.id</text>
  <text x="60" y="620" fill="#f472b6" font-size="9">UK(photo_id, user_id)</text>
  <text x="60" y="636" fill="#475569" font-size="9">created_at</text>

  <!-- cat_follow (bottom-center) -->
  <rect x="310" y="530" width="200" height="115" rx="6" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <rect x="310" y="530" width="200" height="28" rx="6" fill="#0a3d2e" stroke="#34d399" stroke-width="1.5"/>
  <text x="410" y="548" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">cat_follow（关注表）</text>
  <text x="320" y="572" fill="#475569" font-size="9">[PK] id: BIGINT</text>
  <text x="320" y="588" fill="#475569" font-size="9">[FK] user_id → user.id</text>
  <text x="320" y="604" fill="#475569" font-size="9">[FK] cat_id → cat.id</text>
  <text x="320" y="620" fill="#34d399" font-size="9">UK(user_id, cat_id)</text>
  <text x="320" y="636" fill="#475569" font-size="9">created_at</text>

  <!-- cat_rating (bottom-right) -->
  <rect x="600" y="530" width="220" height="130" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="600" y="530" width="220" height="28" rx="6" fill="#5c420a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="710" y="548" fill="#f59e0b" font-size="11" font-weight="700" text-anchor="middle">cat_rating（评分表）</text>
  <text x="610" y="572" fill="#475569" font-size="9">[PK] id: BIGINT</text>
  <text x="610" y="588" fill="#475569" font-size="9">[FK] cat_id → cat.id</text>
  <text x="610" y="604" fill="#475569" font-size="9">[FK] user_id → user.id</text>
  <text x="610" y="620" fill="#475569" font-size="9">r1~r5: INT (1-5)</text>
  <text x="610" y="636" fill="#f59e0b" font-size="9">UK(user_id, cat_id)</text>
  <text x="610" y="652" fill="#475569" font-size="9">created_at</text>

  <!-- ===== RELATIONSHIPS (lines with labels) ===== -->

  <!-- user -> cat (1:N via creator_id) -->
  <line x1="200" y1="200" x2="310" y2="220" stroke="#64748b" stroke-width="1.5"/>
  <text x="245" y="195" fill="#22d3ee" font-size="9">1</text>
  <text x="275" y="215" fill="#34d399" font-size="9">N</text>
  <rect x="220" y="225" width="70" height="18" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="255" y="238" fill="#475569" font-size="8" text-anchor="middle">创建</text>

  <!-- cat -> photo (1:N via cat_id) -->
  <line x1="530" y1="190" x2="600" y2="180" stroke="#64748b" stroke-width="1.5"/>
  <text x="555" y="185" fill="#34d399" font-size="9">1</text>
  <text x="578" y="178" fill="#a78bfa" font-size="9">N</text>
  <rect x="540" y="195" width="55" height="18" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="568" y="208" fill="#475569" font-size="8" text-anchor="middle">拥有</text>

  <!-- cat -> comment (1:N via cat_id) -->
  <line x1="310" y1="350" x2="230" y2="370" stroke="#64748b" stroke-width="1.5"/>
  <text x="288" y="345" fill="#34d399" font-size="9">1</text>
  <text x="250" y="365" fill="#fbbf24" font-size="9">N</text>

  <!-- cat -> activity_log (1:N via cat_id) -->
  <line x1="530" y1="250" x2="850" y2="360" stroke="#64748b" stroke-width="1.5"/>
  <text x="680" y="285" fill="#34d399" font-size="9">1</text>
  <text x="820" y="345" fill="#fb923c" font-size="9">N</text>

  <!-- user -> comment (1:N via user_id) -->
  <line x1="150" y1="310" x2="140" y2="440" stroke="#64748b" stroke-width="1.5"/>
  <text x="160" y="370" fill="#22d3ee" font-size="9">1</text>
  <text x="155" y="425" fill="#fbbf24" font-size="9">N</text>

  <!-- user -> activity_log (1:N via user_id) -->
  <line x1="150" y1="220" x2="900" y2="310" stroke="#64748b" stroke-width="1.5"/>
  <text x="550" y="255" fill="#22d3ee" font-size="9">1</text>
  <text x="880" y="305" fill="#fb923c" font-size="9">N</text>

  <!-- user -> photo_like (1:N via user_id) -->
  <line x1="150" y1="310" x2="150" y2="530" stroke="#64748b" stroke-width="1.5"/>
  <text x="165" y="480" fill="#22d3ee" font-size="9">1</text>
  <text x="165" y="520" fill="#f472b6" font-size="9">N</text>

  <!-- photo -> photo_like (1:N via photo_id) -->
  <line x1="650" y1="230" x2="150" y2="590" stroke="#64748b" stroke-width="1.5"/>
  <text x="250" y="390" fill="#a78bfa" font-size="9">1</text>
  <text x="220" y="580" fill="#f472b6" font-size="9">N</text>

  <!-- user -> cat_follow (1:N via user_id) -->
  <line x1="210" y1="400" x2="380" y2="530" stroke="#64748b" stroke-width="1.5"/>
  <text x="290" y="460" fill="#22d3ee" font-size="9">1</text>
  <text x="370" y="520" fill="#34d399" font-size="9">N</text>

  <!-- cat -> cat_follow (1:N via cat_id) -->
  <line x1="440" y1="280" x2="430" y2="530" stroke="#64748b" stroke-width="1.5"/>
  <text x="450" y="400" fill="#34d399" font-size="9">1</text>
  <text x="445" y="520" fill="#34d399" font-size="9">N</text>

  <!-- user -> cat_rating (1:N via user_id) -->
  <line x1="250" y1="450" x2="650" y2="580" stroke="#64748b" stroke-width="1.5"/>
  <text x="430" y="510" fill="#22d3ee" font-size="9">1</text>
  <text x="640" y="570" fill="#f59e0b" font-size="9">N</text>

  <!-- cat -> cat_rating (1:N via cat_id) -->
  <line x1="520" y1="275" x2="700" y2="530" stroke="#64748b" stroke-width="1.5"/>
  <text x="610" y="390" fill="#34d399" font-size="9">1</text>
  <text x="690" y="520" fill="#f59e0b" font-size="9">N</text>

  <!-- cat self-reference: father_id/mother_id -->
  <path d="M 530 200 Q 600 140 530 140" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <text x="575" y="150" fill="#34d399" font-size="9">1</text>
  <text x="575" y="130" fill="#34d399" font-size="9">N</text>
  <rect x="540" y="113" width="50" height="18" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="565" y="126" fill="#475569" font-size="8" text-anchor="middle">亲属</text>

  <!-- user -> photo (uploader_id) -->
  <line x1="250" y1="200" x2="600" y2="170" stroke="#64748b" stroke-width="1"/>
  <text x="500" y="178" fill="#22d3ee" font-size="8">1</text>
  <text x="565" y="165" fill="#a78bfa" font-size="8">N</text>

  <!-- user -> photo (reviewer_id) -->
  <line x1="200" y1="210" x2="600" y2="160" stroke="#64748b" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="500" y="200" fill="#22d3ee" font-size="8">(审核)</text>

  <!-- Legend -->
  <rect x="900" y="700" width="320" height="120" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1060" y="720" fill="#475569" font-size="10" font-weight="600" text-anchor="middle">图例</text>
  <rect x="915" y="730" width="14" height="14" rx="2" fill="#0e3a5c" stroke="#22d3ee" stroke-width="1"/>
  <text x="940" y="742" fill="#475569" font-size="9">基础数据表</text>
  <rect x="915" y="752" width="14" height="14" rx="2" fill="#5c2d0a" stroke="#fb923c" stroke-width="1"/>
  <text x="940" y="764" fill="#475569" font-size="9">日志数据表</text>
  <rect x="915" y="774" width="14" height="14" rx="2" fill="#5c1a3e" stroke="#f472b6" stroke-width="1"/>
  <text x="940" y="786" fill="#475569" font-size="9">互动数据表</text>
  <text x="1060" y="810" fill="#64748b" font-size="8" text-anchor="middle">PK = 主键  FK = 外键  UK = 唯一约束</text>
</svg>