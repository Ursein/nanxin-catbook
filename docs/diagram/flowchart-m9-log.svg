<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 750" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#007bff"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#dc3545"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#28a745"/></marker>
  </defs>
  <rect width="720" height="750" fill="#ffffff" rx="8"/>
  <text x="360" y="32" text-anchor="middle" fill="#1a1a2e" font-size="17" font-weight="bold">M9 日志管理流程图</text>

  <ellipse cx="360" cy="62" rx="55" ry="18" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="360" y="68" text-anchor="middle" fill="#155724" font-size="14" font-weight="bold">开　始</text>
  <line x1="360" y1="80" x2="360" y2="105" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="270" y="108" width="180" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="360" y="131" text-anchor="middle" fill="#0056b3" font-size="14">用户发起操作</text>
  <line x1="360" y1="144" x2="360" y2="170" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="250" y="172" width="220" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="360" y="195" text-anchor="middle" fill="#0056b3" font-size="14">拦截器捕获请求</text>
  <text x="360" y="206" text-anchor="middle" fill="#6c757d" font-size="10">HandlerInterceptor</text>
  <line x1="360" y1="208" x2="360" y2="235" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="235" y="238" width="250" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="360" y="261" text-anchor="middle" fill="#0056b3" font-size="13">记录请求信息</text>
  <text x="360" y="272" text-anchor="middle" fill="#6c757d" font-size="10">method / url / params / ip / userId</text>
  <line x1="360" y1="274" x2="360" y2="300" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="285" y="303" width="150" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="360" y="326" text-anchor="middle" fill="#0056b3" font-size="14">执行业务逻辑</text>
  <line x1="360" y1="339" x2="360" y2="366" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="245" y="368" width="230" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="360" y="391" text-anchor="middle" fill="#0056b3" font-size="13">记录响应结果</text>
  <text x="360" y="402" text-anchor="middle" fill="#6c757d" font-size="10">status / 耗时 / 响应体</text>
  <line x1="360" y1="404" x2="360" y2="432" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="260" y="435" width="200" height="36" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="360" y="458" text-anchor="middle" fill="#155724" font-size="14">异步写入 log 表</text>
  <text x="360" y="469" text-anchor="middle" fill="#6c757d" font-size="10">不阻塞业务响应</text>
  <line x1="360" y1="471" x2="360" y2="498" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <polygon points="360,504 435,540 360,576 285,540" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="360" y="538" text-anchor="middle" fill="#856404" font-size="13">需要审计？</text>
  <text x="320" y="556" text-anchor="middle" fill="#856404" font-size="11">是</text>
  <text x="405" y="556" text-anchor="middle" fill="#856404" font-size="11">否</text>

  <!-- 是 -->
  <line x1="320" y1="552" x2="175" y2="600" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="80" y="600" width="190" height="36" rx="6" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="175" y="623" text-anchor="middle" fill="#721c24" font-size="13">标记为审计日志</text>
  <text x="175" y="634" text-anchor="middle" fill="#6c757d" font-size="10">写入 audit_log 独立表</text>

  <!-- 否 -->
  <line x1="405" y1="552" x2="560" y2="600" stroke="#28a745" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="490" y="600" width="140" height="36" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="560" y="623" text-anchor="middle" fill="#155724" font-size="13">保留常规日志</text>

  <!-- 汇合 -->
  <line x1="175" y1="636" x2="175" y2="660" stroke="#007bff" stroke-width="1.5"/>
  <line x1="560" y1="636" x2="560" y2="660" stroke="#007bff" stroke-width="1.5"/>
  <line x1="175" y1="660" x2="360" y2="660" stroke="#007bff" stroke-width="1.5"/>
  <line x1="360" y1="660" x2="560" y2="660" stroke="#007bff" stroke-width="1.5"/>
  <line x1="360" y1="660" x2="360" y2="685" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="245" y="688" width="230" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="360" y="711" text-anchor="middle" fill="#0056b3" font-size="13">自动清理（30天前）</text>

  <ellipse cx="360" cy="742" rx="55" ry="18" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="360" y="748" text-anchor="middle" fill="#155724" font-size="14" font-weight="bold">结　束</text>
</svg>