<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="950" fill="#0f172a"/>
  <rect width="1400" height="950" fill="url(#grid)"/>

  <!-- Title -->
  <text x="700" y="35" fill="white" font-size="16" font-weight="700" text-anchor="middle">0 层数据流图 - 南信猫友记</text>

  <!-- ========== External Entities ========== -->
  <!-- 普通用户 -->
  <rect x="35" y="80" width="170" height="95" rx="4" fill="#0f172a"/>
  <rect x="35" y="80" width="170" height="95" rx="4" fill="rgba(8,51,68,0.6)" stroke="#22d3ee" stroke-width="2"/>
  <text x="120" y="115" fill="white" font-size="12" font-weight="700" text-anchor="middle">普通用户</text>
  <text x="120" y="133" fill="#94a3b8" font-size="9" text-anchor="middle">Regular User</text>
  <text x="120" y="157" fill="#64748b" font-size="7" text-anchor="middle">浏览器</text>

  <!-- 管理员 -->
  <rect x="1155" y="80" width="170" height="95" rx="4" fill="#0f172a"/>
  <rect x="1155" y="80" width="170" height="95" rx="4" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="2"/>
  <text x="1240" y="115" fill="white" font-size="12" font-weight="700" text-anchor="middle">管理员</text>
  <text x="1240" y="133" fill="#94a3b8" font-size="9" text-anchor="middle">Admin</text>
  <text x="1240" y="157" fill="#64748b" font-size="7" text-anchor="middle">浏览器</text>

  <!-- ========== PROCESSES (8 processes arranged in 2 rows x 4 cols) ========== -->

  <!-- Row 1: y=80 -->
  <!-- P1 用户管理 -->
  <rect x="280" y="80" width="155" height="75" rx="6" fill="#0f172a"/>
  <rect x="280" y="80" width="155" height="75" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <text x="357" y="110" fill="white" font-size="12" font-weight="700" text-anchor="middle">P1 用户管理</text>
  <text x="357" y="130" fill="#94a3b8" font-size="9" text-anchor="middle">注册 / 登录 / JWT</text>

  <!-- P2 猫咪管理 -->
  <rect x="490" y="80" width="155" height="75" rx="6" fill="#0f172a"/>
  <rect x="490" y="80" width="155" height="75" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <text x="567" y="110" fill="white" font-size="12" font-weight="700" text-anchor="middle">P2 猫咪管理</text>
  <text x="567" y="130" fill="#94a3b8" font-size="9" text-anchor="middle">添加 / 编辑 / 删除</text>

  <!-- P3 浏览搜索 -->
  <rect x="700" y="80" width="155" height="75" rx="6" fill="#0f172a"/>
  <rect x="700" y="80" width="155" height="75" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <text x="777" y="110" fill="white" font-size="12" font-weight="700" text-anchor="middle">P3 浏览搜索</text>
  <text x="777" y="130" fill="#94a3b8" font-size="9" text-anchor="middle">关键词搜索 / 筛选</text>

  <!-- P4 照片管理 -->
  <rect x="910" y="80" width="155" height="75" rx="6" fill="#0f172a"/>
  <rect x="910" y="80" width="155" height="75" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <text x="987" y="110" fill="white" font-size="12" font-weight="700" text-anchor="middle">P4 照片管理</text>
  <text x="987" y="130" fill="#94a3b8" font-size="9" text-anchor="middle">上传 / 审核 / 点赞</text>

  <!-- Row 2: y=240 -->
  <!-- P5 评论管理 -->
  <rect x="280" y="240" width="155" height="75" rx="6" fill="#0f172a"/>
  <rect x="280" y="240" width="155" height="75" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <text x="357" y="270" fill="white" font-size="12" font-weight="700" text-anchor="middle">P5 评论管理</text>
  <text x="357" y="290" fill="#94a3b8" font-size="9" text-anchor="middle">发表 / 查看 / 删除</text>

  <!-- P6 推荐计算 -->
  <rect x="490" y="240" width="155" height="75" rx="6" fill="#0f172a"/>
  <rect x="490" y="240" width="155" height="75" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="2"/>
  <text x="567" y="270" fill="white" font-size="12" font-weight="700" text-anchor="middle">P6 推荐计算</text>
  <text x="567" y="290" fill="#94a3b8" font-size="9" text-anchor="middle">★ 余弦相似度+热度因子</text>

  <!-- P7 关注管理 -->
  <rect x="700" y="240" width="155" height="75" rx="6" fill="#0f172a"/>
  <rect x="700" y="240" width="155" height="75" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <text x="777" y="270" fill="white" font-size="12" font-weight="700" text-anchor="middle">P7 关注管理</text>
  <text x="777" y="290" fill="#94a3b8" font-size="9" text-anchor="middle">关注 / 取消关注</text>

  <!-- P8 评分管理 -->
  <rect x="910" y="240" width="155" height="75" rx="6" fill="#0f172a"/>
  <rect x="910" y="240" width="155" height="75" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <text x="987" y="270" fill="white" font-size="12" font-weight="700" text-anchor="middle">P8 评分管理</text>
  <text x="987" y="290" fill="#94a3b8" font-size="9" text-anchor="middle">1-5 星评分</text>

  <!-- ========== DATA STORES (8 cylinders, bottom area) ========== -->
  <!-- D1 用户表 -->
  <g transform="translate(40, 480)">
    <rect x="0" y="12" width="120" height="50" rx="2" fill="#0f172a"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="#0f172a"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="#0f172a"/>
    <rect x="0" y="12" width="120" height="50" fill="rgba(76,29,149,0.4)"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="62" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="120" y1="12" x2="120" y2="62" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="60" y="38" fill="white" font-size="10" font-weight="600" text-anchor="middle">D1 用户表</text>
  </g>

  <!-- D2 猫咪表 -->
  <g transform="translate(210, 480)">
    <rect x="0" y="12" width="120" height="50" rx="2" fill="#0f172a"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="#0f172a"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="#0f172a"/>
    <rect x="0" y="12" width="120" height="50" fill="rgba(76,29,149,0.4)"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="62" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="120" y1="12" x2="120" y2="62" stroke="#a78bfa" stroke-width="1.5"/>
