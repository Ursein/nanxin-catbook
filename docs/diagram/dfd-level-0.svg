  <!-- P5 → D5: 评论日志 -->
  <path d="M 435,240 L 435,220 L 780,220 L 780,480" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="610" y="215" fill="#ff6b6b" font-size="8" text-anchor="middle">P5→D5 评论日志</text>

