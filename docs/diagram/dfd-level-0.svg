    <ellipse cx="60" cy="12" rx="60" ry="12" fill="#0f172a"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="#0f172a"/>
    <rect x="0" y="12" width="120" height="50" fill="rgba(76,29,149,0.4)"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="62" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="120" y1="12" x2="120" y2="62" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="60" y="38" fill="white" font-size="10" font-weight="600" text-anchor="middle">D3 照片表</text>
  </g>

  <!-- D4 评论表 -->
  <g transform="translate(550, 480)">
    <rect x="0" y="12" width="120" height="50" rx="2" fill="#0f172a"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="#0f172a"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="#0f172a"/>
    <rect x="0" y="12" width="120" height="50" fill="rgba(76,29,149,0.4)"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="62" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="120" y1="12" x2="120" y2="62" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="60" y="38" fill="white" font-size="10" font-weight="600" text-anchor="middle">D4 评论表</text>
  </g>

  <!-- D5 日志表 -->
  <g transform="translate(720, 480)">
    <rect x="0" y="12" width="120" height="50" rx="2" fill="#0f172a"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="#0f172a"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="#0f172a"/>
    <rect x="0" y="12" width="120" height="50" fill="rgba(255,107,107,0.25)"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="rgba(255,107,107,0.25)" stroke="#ff6b6b" stroke-width="1.5"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="rgba(255,107,107,0.25)" stroke="#ff6b6b" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="62" stroke="#ff6b6b" stroke-width="1.5"/>
    <line x1="120" y1="12" x2="120" y2="62" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="60" y="38" fill="white" font-size="10" font-weight="600" text-anchor="middle">D5 日志表</text>
  </g>

  <!-- D6 点赞表 -->
  <g transform="translate(890, 480)">
    <rect x="0" y="12" width="120" height="50" rx="2" fill="#0f172a"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="#0f172a"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="#0f172a"/>
    <rect x="0" y="12" width="120" height="50" fill="rgba(251,146,60,0.3)"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="62" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="120" y1="12" x2="120" y2="62" stroke="#fb923c" stroke-width="1.5"/>
    <text x="60" y="38" fill="white" font-size="10" font-weight="600" text-anchor="middle">D6 点赞表</text>
  </g>

  <!-- D7 关注表 -->
  <g transform="translate(1060, 480)">
    <rect x="0" y="12" width="120" height="50" rx="2" fill="#0f172a"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="#0f172a"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="#0f172a"/>
    <rect x="0" y="12" width="120" height="50" fill="rgba(251,146,60,0.3)"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="62" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="120" y1="12" x2="120" y2="62" stroke="#fb923c" stroke-width="1.5"/>
    <text x="60" y="38" fill="white" font-size="10" font-weight="600" text-anchor="middle">D7 关注表</text>
  </g>

  <!-- D8 评分表 -->
  <g transform="translate(1230, 480)">
    <rect x="0" y="12" width="120" height="50" rx="2" fill="#0f172a"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="#0f172a"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="#0f172a"/>
    <rect x="0" y="12" width="120" height="50" fill="rgba(251,146,60,0.3)"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="62" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="120" y1="12" x2="120" y2="62" stroke="#fb923c" stroke-width="1.5"/>
    <text x="60" y="38" fill="white" font-size="10" font-weight="600" text-anchor="middle">D8 评分表</text>
  </g>

  <!-- ========== DATA FLOWS: External Entities ↔ Processes ========== -->

  <!-- 用户 → P1: 注册/登录 -->
  <path d="M 205,105 L 280,105" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="243" y="98" fill="#22d3ee" font-size="8" text-anchor="middle">注册/登录</text>

  <!-- P1 → 用户: Token -->
  <path d="M 280,130 L 205,130" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="243" y="143" fill="#34d399" font-size="8" text-anchor="middle">Token</text>

  <!-- 用户 → P3: 搜索请求 -->
  <path d="M 205,155 L 205,380 L 700,380 L 700,365" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="490" y="393" fill="#22d3ee" font-size="8" text-anchor="middle">搜索请求</text>

  <!-- 用户 → P4: 照片/点赞 -->
  <path d="M 205,170 L 205,420 L 910,420 L 910,365" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="780" y="415" fill="#22d3ee" font-size="8" text-anchor="middle">照片 / 点赞请求</text>

  <!-- 用户 → P5: 留言 -->
  <path d="M 205,165 L 205,440 L 280,440 L 280,315" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="243" y="445" fill="#22d3ee" font-size="8" text-anchor="middle">留言内容</text>

  <!-- 用户 → P7: 关注请求 -->
  <path d="M 205,160 L 205,450 L 700,450 L 700,315" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="455" fill="#22d3ee" font-size="8" text-anchor="middle">关注/取消请求</text>

  <!-- 用户 → P8: 评分请求 -->
  <path d="M 205,175 L 205,460 L 910,460 L 910,315" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="455" fill="#22d3ee" font-size="8" text-anchor="middle">评分请求</text>

  <!-- 管理员 → P2 -->
  <path d="M 1155,105 L 645,105" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="900" y="98" fill="#a78bfa" font-size="8" text-anchor="middle">管理操作</text>

  <!-- 管理员 → P4: 审核 -->
  <path d="M 1155,130 L 1065,130" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="1110" y="123" fill="#a78bfa" font-size="8" text-anchor="middle">审核照片</text>

  <!-- ========== DATA FLOWS: Processes ↔ Data Stores ========== -->

  <!-- P1 ⟷ D1 -->
  <path d="M 357,155 L 357,190 L 100,190 L 100,480" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <text x="220" y="185" fill="#64748b" font-size="8" text-anchor="middle">D1 用户表</text>

  <!-- P2 ⟷ D2 -->
  <path d="M 567,155 L 567,190 L 270,190 L 270,480" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <text x="410" y="185" fill="#64748b" font-size="8" text-anchor="middle">D2 猫咪表</text>

  <!-- P3 ⟷ D2 -->
  <path d="M 777,155 L 777,190 L 270,190" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <text x="520" y="185" fill="#64748b" font-size="8" text-anchor="middle">D2 猫咪表</text>

  <!-- P4 ⟷ D3 -->
  <path d="M 987,155 L 987,190 L 440,190 L 440,480" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <text x="700" y="185" fill="#64748b" font-size="8" text-anchor="middle">D3 照片表</text>

  <!-- P4 → D6 (点赞表) -->
  <path d="M 910,200 L 910,220 L 950,220 L 950,480" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="960" y="220" fill="#fb923c" font-size="8" text-anchor="middle">点赞数据</text>

  <!-- P5 ⟷ D4 -->
  <path d="M 357,315 L 357,350 L 610,350 L 610,480" fill="none" stroke="#64748b" stroke-width="1.5"/>
  <text x="490" y="355" fill="#64748b" font-size="8" text-anchor="middle">D4 评论表</text>

  <!-- P6 ↔ D2 (猫咪特征) -->
