<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 820" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#007bff"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#dc3545"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#28a745"/></marker>
  </defs>
  <rect width="750" height="820" fill="#ffffff" rx="8"/>
  <text x="375" y="32" text-anchor="middle" fill="#1a1a2e" font-size="17" font-weight="bold">M5 评论管理流程图</text>

  <ellipse cx="375" cy="62" rx="55" ry="18" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="375" y="68" text-anchor="middle" fill="#155724" font-size="14" font-weight="bold">开　始</text>
  <line x1="375" y1="80" x2="375" y2="105" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="250" y="108" width="250" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="375" y="131" text-anchor="middle" fill="#0056b3" font-size="14">收到评论请求</text>
  <line x1="375" y1="144" x2="375" y2="170" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <polygon points="375,176 465,216 375,256 285,216" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="375" y="212" text-anchor="middle" fill="#856404" font-size="14" font-weight="bold">操作类型？</text>
  <text x="300" y="234" text-anchor="middle" fill="#856404" font-size="12">GET 查询</text>
  <text x="375" y="248" text-anchor="middle" fill="#856404" font-size="12">POST 发表</text>
  <text x="460" y="234" text-anchor="middle" fill="#856404" font-size="12">DELETE 删除</text>

  <!-- GET -->
  <line x1="320" y1="230" x2="140" y2="290" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="50" y="292" width="180" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="140" y="315" text-anchor="middle" fill="#0056b3" font-size="13">查询评论列表</text>
  <text x="140" y="326" text-anchor="middle" fill="#6c757d" font-size="10">时间倒序, 分页20条</text>
  <line x1="140" y1="328" x2="140" y2="365" stroke="#007bff" stroke-width="1.5"/>
  <rect x="50" y="368" width="180" height="36" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="140" y="391" text-anchor="middle" fill="#155724" font-size="13">返回评论列表</text>

  <!-- POST -->
  <line x1="375" y1="256" x2="375" y2="290" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="280" y="292" width="190" height="36" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="375" y="315" text-anchor="middle" fill="#0056b3" font-size="13">校验评论内容（≤500字）</text>
  <line x1="375" y1="328" x2="375" y2="355" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <polygon points="375,362 435,396 375,430 315,396" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="375" y="394" text-anchor="middle" fill="#856404" font-size="12">内容有效？</text>
  <text x="340" y="412" text-anchor="middle" fill="#856404" font-size="11">否</text>
  <text x="410" y="412" text-anchor="middle" fill="#856404" font-size="11">是</text>

  <line x1="315" y1="396" x2="270" y2="396" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="240" y="384" width="30" height="24" rx="4" fill="#f8d7da" stroke="#dc3545" stroke-width="1"/>
  <text x="255" y="401" text-anchor="middle" fill="#721c24" font-size="10">400</text>

  <line x1="435" y1="396" x2="500" y2="440" stroke="#28a745" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="495" y="440" width="170" height="36" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="580" y="461" text-anchor="middle" fill="#155724" font-size="13">写入 comment 表</text>
  <text x="580" y="472" text-anchor="middle" fill="#6c757d" font-size="10">content + catId + userId</text>
  <line x1="580" y1="476" x2="580" y2="510" stroke="#007bff" stroke-width="1.5"/>

  <!-- DELETE -->
  <line x1="430" y1="230" x2="620" y2="290" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="540" y="290" width="160" height="36" rx="6" fill="#f8d7da" stroke="#dc3545" stroke-width="1.5"/>
  <text x="620" y="313" text-anchor="middle" fill="#721c24" font-size="13">校验本人或管理员</text>
  <line x1="620" y1="326" x2="620" y2="355" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>

  <polygon points="620,362 680,396 620,430 560,396" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="620" y="394" text-anchor="middle" fill="#856404" font-size="12">有权删除？</text>
  <text x="585" y="412" text-anchor="middle" fill="#856404" font-size="11">否</text>
  <text x="655" y="412" text-anchor="middle" fill="#856404" font-size="11">是</text>

  <line x1="560" y1="396" x2="530" y2="396" stroke="#dc3545" stroke-width="1.5" marker-end="url(#ar)"/>
  <rect x="500" y="384" width="30" height="24" rx="4" fill="#f8d7da" stroke="#dc3545" stroke-width="1"/>
  <text x="515" y="401" text-anchor="middle" fill="#721c24" font-size="10">403</text>

  <line x1="680" y1="396" x2="680" y2="460" stroke="#28a745" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="600" y="460" width="160" height="36" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="680" y="483" text-anchor="middle" fill="#155724" font-size="13">软删除评论</text>

  <!-- 汇合 -->
  <line x1="140" y1="404" x2="140" y2="510" stroke="#007bff" stroke-width="1.5"/>
  <line x1="580" y1="510" x2="680" y2="510" stroke="#007bff" stroke-width="1.5"/>
  <line x1="140" y1="510" x2="375" y2="510" stroke="#007bff" stroke-width="1.5"/>
  <line x1="375" y1="510" x2="580" y2="510" stroke="#007bff" stroke-width="1.5"/>
  <line x1="375" y1="510" x2="375" y2="550" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <ellipse cx="375" cy="580" rx="55" ry="20" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="375" y="586" text-anchor="middle" fill="#155724" font-size="14" font-weight="bold">结　束</text>
</svg>