<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850" font-family="Microsoft YaHei, SimHei, sans-serif">
  

  <defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><rect width="20" height="20" fill="none" stroke="#f1f5f9" stroke-width="0.5"/></pattern></defs><rect width="100%" height="100%" fill="#ffffff"/>
  <rect width="1100" height="850" fill="#ffffff"/>
  <rect width="1100" height="850" fill="url(#grid)"/>

  <text x="550" y="30" fill="#1e293b" font-size="15" font-weight="700" text-anchor="middle">时序图：用户浏览详情页 → 推荐算法调用</text>
  <text x="550" y="48" fill="#475569" font-size="9" text-anchor="middle">展示从用户点击猫咪卡片到推荐结果返回的完整交互过程</text>

  <!-- Actors / Lifelines -->
  <!-- 用户 (left) -->
  <rect x="40" y="75" width="70" height="100" rx="35" fill="#1e293b" stroke="#22d3ee" stroke-width="2"/>
  <text x="75" y="130" fill="#22d3ee" font-size="10" font-weight="600" text-anchor="middle">用户</text>
  <line x1="75" y1="175" x2="75" y2="800" stroke="#22d3ee" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- 浏览器 (center-left) -->
  <rect x="200" y="75" width="70" height="100" rx="35" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="235" y="130" fill="#34d399" font-size="10" font-weight="600" text-anchor="middle">浏览器</text>
  <line x1="235" y1="175" x2="235" y2="800" stroke="#34d399" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- CatController (center) -->
  <rect x="380" y="75" width="90" height="35" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="425" y="97" fill="#f59e0b" font-size="10" font-weight="600" text-anchor="middle">CatController</text>
  <line x1="425" y1="110" x2="425" y2="800" stroke="#f59e0b" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- CatService (center-right) -->
  <rect x="570" y="75" width="85" height="35" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="613" y="97" fill="#a78bfa" font-size="10" font-weight="600" text-anchor="middle">CatService</text>
  <line x1="613" y1="110" x2="613" y2="800" stroke="#a78bfa" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- CatSimilarityAlgorithm (right) -->
  <rect x="770" y="75" width="130" height="35" rx="6" fill="#1e293b" stroke="#fb923c" stroke-width="2"/>
  <text x="835" y="97" fill="#fb923c" font-size="10" font-weight="600" text-anchor="middle">CatSimilarityAlgorithm</text>
  <line x1="835" y1="110" x2="835" y2="800" stroke="#fb923c" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- DB (rightmost) -->
  <rect x="980" y="75" width="70" height="35" rx="6" fill="#1e293b" stroke="#f472b6" stroke-width="2"/>
  <text x="1015" y="97" fill="#f472b6" font-size="10" font-weight="600" text-anchor="middle">MySQL</text>
  <line x1="1015" y1="110" x2="1015" y2="800" stroke="#f472b6" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Interaction arrows -->

  <!-- 1. 点击猫咪卡片 -->
  <line x1="75" y1="200" x2="235" y2="200" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="105" y="193" fill="#22d3ee" font-size="9">1. 点击猫咪卡片</text>

  <!-- 2. GET /cats/{id} -->
  <line x1="235" y1="225" x2="425" y2="225" stroke="#34d399" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="245" y="218" fill="#34d399" font-size="9">2. GET /cats/{id}</text>

  <!-- 3. getCatDetail() -->
  <line x1="425" y1="250" x2="613" y2="250" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="435" y="243" fill="#f59e0b" font-size="9">3. getCatDetail(catId)</text>

  <!-- 4a. 查询猫咪信息 -->
  <line x1="613" y1="280" x2="1015" y2="280" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="680" y="273" fill="#a78bfa" font-size="9">4a. SELECT cat WHERE id=?</text>
  <!-- 4a return -->
  <line x1="1015" y1="300" x2="613" y2="300" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="780" y="293" fill="#f472b6" font-size="9">Cat 实体</text>

  <!-- 4b. 查询照片 -->
  <line x1="613" y1="325" x2="1015" y2="325" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="680" y="318" fill="#a78bfa" font-size="9">4b. SELECT photo WHERE cat_id=?</text>
  <line x1="1015" y1="345" x2="613" y2="345" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="780" y="338" fill="#f472b6" font-size="9">Photo 列表</text>

  <!-- 4c. 查询留言 -->
  <line x1="613" y1="370" x2="1015" y2="370" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="680" y="363" fill="#a78bfa" font-size="9">4c. SELECT comment WHERE cat_id=?</text>
  <line x1="1015" y1="390" x2="613" y2="390" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="780" y="383" fill="#f472b6" font-size="9">Comment 列表</text>

  <!-- 5. 返回详情 -->
  <line x1="613" y1="415" x2="425" y2="415" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="480" y="408" fill="#a78bfa" font-size="9">5. 返回 CatDetailResponse</text>

  <!-- 6. 请求推荐 -->
  <line x1="425" y1="445" x2="613" y2="445" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="435" y="438" fill="#f59e0b" font-size="9">6. getRecommendations(catId)</text>

  <!-- 7. 调用推荐算法 -->
  <line x1="613" y1="475" x2="835" y2="475" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="640" y="468" fill="#a78bfa" font-size="9">7. recommend(catId, topN)</text>

  <!-- 8a. 查询所有猫咪特征 -->
  <line x1="835" y1="510" x2="1015" y2="510" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="870" y="503" fill="#fb923c" font-size="9">8a. SELECT cat WHERE status=ACTIVE</text>
  <line x1="1015" y1="530" x2="835" y2="530" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="900" y="523" fill="#f472b6" font-size="9">所有猫咪数据</text>

  <!-- 8b. 查询热度数据 -->
  <line x1="835" y1="560" x2="1015" y2="560" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="870" y="553" fill="#fb923c" font-size="9">8b. 热度统计查询（like/follow/rating）</text>
  <line x1="1015" y1="580" x2="835" y2="580" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="900" y="573" fill="#f472b6" font-size="9">热度数据</text>

  <!-- 9. 计算相似度（算法内部） -->
  <rect x="830" y="600" width="120" height="20" rx="4" fill="#5c2d0a" stroke="#fb923c" stroke-width="1"/>
  <text x="890" y="614" fill="#fb923c" font-size="9" text-anchor="middle">9. 算法计算</text>
  <text x="890" y="635" fill="#475569" font-size="8" text-anchor="middle">特征提取→One-Hot编码</text>
  <text x="890" y="652" fill="#475569" font-size="8" text-anchor="middle">→余弦相似度→热度融合→排序</text>

  <!-- 10. 返回推荐结果 -->
  <line x1="835" y1="670" x2="613" y2="670" stroke="#fb923c" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="690" y="663" fill="#fb923c" font-size="9">10. 返回 RecommendResult 列表</text>

  <!-- 11. 返回详情（含推荐） -->
  <line x1="613" y1="700" x2="425" y2="700" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="480" y="693" fill="#a78bfa" font-size="9">11. 聚合推荐数据到详情</text>

  <!-- 12. 渲染页面 -->
  <line x1="425" y1="730" x2="235" y2="730" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="300" y="723" fill="#f59e0b" font-size="9">12. JSON 响应</text>

  <line x1="235" y1="760" x2="75" y2="760" stroke="#34d399" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="100" y="753" fill="#34d399" font-size="9">13. 渲染猫咪详情页 + 推荐栏</text>

  <!-- Legend -->
  <rect x="30" y="680" width="140" height="85" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="100" y="697" fill="#475569" font-size="8" font-weight="600" text-anchor="middle">图例</text>
  <line x1="40" y1="712" x2="80" y2="712" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="90" y="716" fill="#475569" font-size="8">消息/请求</text>
  <line x1="40" y1="732" x2="80" y2="732" stroke="#64748b" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="90" y="736" fill="#475569" font-size="8">返回/响应</text>
  <line x1="40" y1="755" x2="80" y2="755" stroke="#64748b" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="90" y="759" fill="#475569" font-size="8">生命线</text>
</svg>