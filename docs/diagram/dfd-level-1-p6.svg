<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-coral" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="850" fill="#0f172a"/>
  <rect width="1200" height="850" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="35" fill="white" font-size="16" font-weight="700" text-anchor="middle">1 层数据流图 - P6 推荐计算（加工型）</text>
  <text x="600" y="55" fill="#94a3b8" font-size="9" text-anchor="middle">展开 P6，展示从特征提取到排序输出的完整数据加工流程，融合多源热度因子</text>

  <!-- ========== Data Stores (top sources) ========== -->
  <!-- D2 猫咪表 -->
  <g transform="translate(80, 80)">
    <rect x="0" y="12" width="120" height="50" rx="2" fill="#0f172a"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="#0f172a"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="#0f172a"/>
    <rect x="0" y="12" width="120" height="50" fill="rgba(76,29,149,0.4)"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="62" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="120" y1="12" x2="120" y2="62" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="60" y="38" fill="white" font-size="10" font-weight="600" text-anchor="middle">D2 猫咪表</text>
  </g>

  <!-- D5 日志表 -->
  <g transform="translate(380, 80)">
    <rect x="0" y="12" width="120" height="50" rx="2" fill="#0f172a"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="#0f172a"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="#0f172a"/>
    <rect x="0" y="12" width="120" height="50" fill="rgba(255,107,107,0.25)"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="rgba(255,107,107,0.25)" stroke="#ff6b6b" stroke-width="1.5"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="rgba(255,107,107,0.25)" stroke="#ff6b6b" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="62" stroke="#ff6b6b" stroke-width="1.5"/>
    <line x1="120" y1="12" x2="120" y2="62" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="60" y="38" fill="white" font-size="10" font-weight="600" text-anchor="middle">D5 日志表</text>
  </g>

  <!-- D6 点赞表 -->
  <g transform="translate(680, 80)">
    <rect x="0" y="12" width="120" height="50" rx="2" fill="#0f172a"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="#0f172a"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="#0f172a"/>
    <rect x="0" y="12" width="120" height="50" fill="rgba(251,146,60,0.3)"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="62" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="120" y1="12" x2="120" y2="62" stroke="#fb923c" stroke-width="1.5"/>
    <text x="60" y="38" fill="white" font-size="10" font-weight="600" text-anchor="middle">D6 点赞表</text>
  </g>

  <!-- D7 关注表 -->
  <g transform="translate(860, 80)">
    <rect x="0" y="12" width="120" height="50" rx="2" fill="#0f172a"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="#0f172a"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="#0f172a"/>
    <rect x="0" y="12" width="120" height="50" fill="rgba(251,146,60,0.3)"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="62" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="120" y1="12" x2="120" y2="62" stroke="#fb923c" stroke-width="1.5"/>
    <text x="60" y="38" fill="white" font-size="10" font-weight="600" text-anchor="middle">D7 关注表</text>
  </g>

  <!-- D8 评分表 -->
  <g transform="translate(1040, 80)">
    <rect x="0" y="12" width="120" height="50" rx="2" fill="#0f172a"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="#0f172a"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="#0f172a"/>
    <rect x="0" y="12" width="120" height="50" fill="rgba(251,146,60,0.3)"/>
    <ellipse cx="60" cy="12" rx="60" ry="12" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
    <ellipse cx="60" cy="62" rx="60" ry="12" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="0" y1="12" x2="0" y2="62" stroke="#fb923c" stroke-width="1.5"/>
    <line x1="120" y1="12" x2="120" y2="62" stroke="#fb923c" stroke-width="1.5"/>
    <text x="60" y="38" fill="white" font-size="10" font-weight="600" text-anchor="middle">D8 评分表</text>
  </g>

  <!-- ========== P6 子处理 (4 stages, top to bottom) ========== -->

  <!-- P6.1 特征提取 -->
  <!-- Mask -->
  <rect x="250" y="200" width="180" height="65" rx="6" fill="#0f172a"/>
  <!-- Box -->
  <rect x="250" y="200" width="180" height="65" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="2"/>
  <text x="340" y="228" fill="white" font-size="12" font-weight="700" text-anchor="middle">P6.1 特征提取</text>
  <text x="340" y="248" fill="#94a3b8" font-size="9" text-anchor="middle">毛色 / 性格 / 位置 / 性别</text>

  <!-- Arrow: D2 → P6.1 -->
  <path d="M 140,130 L 140,165 L 250,165 L 250,200" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="195" y="168" fill="#a78bfa" font-size="8" text-anchor="middle">原始特征</text>

  <!-- P6.2 特征向量化 -->
  <rect x="250" y="330" width="180" height="65" rx="6" fill="#0f172a"/>
  <rect x="250" y="330" width="180" height="65" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <text x="340" y="358" fill="white" font-size="12" font-weight="700" text-anchor="middle">P6.2 特征向量化</text>
  <text x="340" y="378" fill="#94a3b8" font-size="9" text-anchor="middle">One-Hot 编码数值向量</text>

  <!-- Arrow: P6.1 → P6.2 -->
  <path d="M 340,265 L 340,330" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="302" fill="#64748b" font-size="8" text-anchor="middle">原始特征</text>

  <!-- P6.3 相似度计算 -->
  <rect x="250" y="460" width="180" height="65" rx="6" fill="#0f172a"/>
  <rect x="250" y="460" width="180" height="65" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="2"/>
  <text x="340" y="488" fill="white" font-size="12" font-weight="700" text-anchor="middle">P6.3 相似度计算</text>
  <text x="340" y="508" fill="#94a3b8" font-size="9" text-anchor="middle">余弦相似度 cos(θ)</text>

  <!-- Arrow: P6.2 → P6.3 -->
  <path d="M 340,395 L 340,460" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="432" fill="#64748b" font-size="8" text-anchor="middle">特征向量A·B</text>

  <!-- P6.4 排序输出 -->
  <rect x="250" y="590" width="180" height="65" rx="6" fill="#0f172a"/>
  <rect x="250" y="590" width="180" height="65" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="2"/>
  <text x="340" y="618" fill="white" font-size="12" font-weight="700" text-anchor="middle">P6.4 排序输出</text>
  <text x="340" y="638" fill="#94a3b8" font-size="9" text-anchor="middle">降序排列 Top-N</text>

  <!-- Arrow: P6.3 → P6.4 -->
  <path d="M 340,525 L 340,590" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="562" fill="#64748b" font-size="8" text-anchor="middle">相似度分数</text>

  <!-- ========== 热度因子融合（右侧输入） ========== -->
  <!-- 热度融合标注 -->
  <rect x="600" y="460" width="200" height="65" rx="6" fill="#0f172a"/>
  <rect x="600" y="460" width="200" height="65" rx="6" fill="rgba(251,146,60,0.25)" stroke="#fb923c" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="700" y="488" fill="white" font-size="11" font-weight="700" text-anchor="middle">🔥 热度因子融合</text>
  <text x="700" y="508" fill="#94a3b8" font-size="8" text-anchor="middle">加权评分 → 综合推荐分数</text>

  <!-- D5 → 热度融合 -->
  <path d="M 440,105 L 440,490 L 600,490" fill="none" stroke="#ff6b6b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="490" y="485" fill="#ff6b6b" font-size="8" text-anchor="middle">浏览/搜索频次</text>

  <!-- D6 → 热度融合 -->
  <path d="M 740,130 L 740,200 L 700,200 L 700,460" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="760" y="210" fill="#fb923c" font-size="8" text-anchor="middle">点赞数</text>

  <!-- D7 → 热度融合 -->
  <path d="M 920,130 L 920,230 L 720,230 L 720,460" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="830" y="240" fill="#fb923c" font-size="8" text-anchor="middle">关注数</text>

  <!-- D8 → 热度融合 -->
  <path d="M 1100,130 L 1100,260 L 740,260 L 740,460" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="950" y="275" fill="#fb923c" font-size="8" text-anchor="middle">评分均分</text>

  <!-- 热度融合 → P6.4 -->
  <path d="M 600,492 L 500,492 L 500,622 L 430,622" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="660" y="515" fill="#fb923c" font-size="8" text-anchor="middle">综合推荐分数</text>

  <!-- ========== 公式标注 ========== -->
  <rect x="530" y="590" width="370" height="65" rx="6" fill="#0f172a"/>
  <rect x="530" y="590" width="370" height="65" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
  <text x="715" y="614" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">Score = cos(θ) + ∑(wᵢ · factorᵢ)</text>
  <text x="715" y="636" fill="#94a3b8" font-size="8" text-anchor="middle">cos(θ) = (A·B) / (|A|·|B|)   |   factor: 点赞/关注/评分热度</text>

  <!-- ========== 输出箭头 ========== -->
  <!-- P6.4 → P3 (推荐结果) -->
  <path d="M 340,655 L 340,710 L 600,710" fill="none" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <text x="580" y="720" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">→ P3 浏览搜索：推荐结果 Top-5</text>

  <!-- ========== Legend ========== -->
  <rect x="60" y="740" width="1080" height="80" rx="8" fill="#0f172a"/>
  <rect x="60" y="740" width="1080" height="80" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
  <text x="600" y="758" fill="#94a3b8" font-size="10" font-weight="600" text-anchor="middle">P6 子处理说明</text>

  <rect x="100" y="770" width="30" height="14" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="145" y="781" fill="#94a3b8" font-size="8">P6.1：特征提取（从猫咪表读取原始特征）</text>

  <rect x="100" y="792" width="30" height="14" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="145" y="803" fill="#94a3b8" font-size="8">P6.2-P6.4：加工型处理链（向量化→相似度计算→排序）</text>

  <!-- Footer -->
  <text x="600" y="830" fill="#475569" font-size="8" text-anchor="middle">南信猫友记 · 软件工程课程项目 · 1 层 P6 数据流图（热度因子融合）</text>
</svg>