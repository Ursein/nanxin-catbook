<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 780" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#007bff"/></marker>
    <marker id="ar" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#dc3545"/></marker>
    <marker id="ag" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0,0 L10,5 L0,10" fill="#28a745"/></marker>
  </defs>
  <rect width="600" height="780" fill="#ffffff" rx="8"/>
  <text x="300" y="32" text-anchor="middle" fill="#1a1a2e" font-size="15" font-weight="bold">M6 / P6 核心推荐算法流程图</text>
  <text x="300" y="48" text-anchor="middle" fill="#6c757d" font-size="10">CatSimilarityAlgorithm.recommend() — 余弦相似度 + 热度因子融合</text>

  <ellipse cx="300" cy="68" rx="50" ry="16" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="300" y="73" text-anchor="middle" fill="#155724" font-size="12" font-weight="bold">开　始</text>
  <line x1="300" y1="84" x2="300" y2="105" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="220" y="108" width="160" height="32" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="300" y="129" text-anchor="middle" fill="#0056b3" font-size="12">加载目标猫信息</text>
  <line x1="300" y1="140" x2="300" y2="162" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="190" y="165" width="220" height="32" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="300" y="186" text-anchor="middle" fill="#0056b3" font-size="12">提取其他所有猫特征</text>
  <line x1="300" y1="197" x2="300" y2="218" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="210" y="222" width="180" height="32" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="300" y="241" text-anchor="middle" fill="#0056b3" font-size="11">One-Hot 编码特征</text>
  <text x="300" y="252" text-anchor="middle" fill="#6c757d" font-size="9">encode(breed, colour, personality...)</text>
  <line x1="300" y1="254" x2="300" y2="275" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <polygon points="300,281 365,315 300,349 235,315" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="300" y="313" text-anchor="middle" fill="#856404" font-size="12">还有未处理猫？</text>
  <text x="260" y="331" text-anchor="middle" fill="#856404" font-size="11">是</text>
  <text x="340" y="331" text-anchor="middle" fill="#856404" font-size="11">否</text>

  <line x1="260" y1="329" x2="115" y2="280" stroke="#28a745" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="30" y="268" width="110" height="28" rx="5" fill="#d4edda" stroke="#28a745" stroke-width="1"/>
  <text x="85" y="286" text-anchor="middle" fill="#155724" font-size="11">计算余弦相似度</text>
  <text x="85" y="295" text-anchor="middle" fill="#6c757d" font-size="8">cosineSimilarity()</text>
  <line x1="85" y1="296" x2="85" y2="330" stroke="#007bff" stroke-width="1.5"/>
  <rect x="25" y="332" width="120" height="28" rx="5" fill="#e8f0fe" stroke="#007bff" stroke-width="1"/>
  <text x="85" y="350" text-anchor="middle" fill="#0056b3" font-size="11">加入相似度列表</text>
  <line x1="85" y1="360" x2="85" y2="390" stroke="#007bff" stroke-width="1.5"/>
  <line x1="85" y1="390" x2="300" y2="390" stroke="#007bff" stroke-width="1.5" stroke-dasharray="4,2"/>

  <line x1="365" y1="315" x2="430" y2="360" stroke="#28a745" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="430" y="360" width="140" height="32" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="500" y="379" text-anchor="middle" fill="#155724" font-size="11">Min-Max 归一化</text>
  <text x="500" y="390" text-anchor="middle" fill="#6c757d" font-size="9">normalize()</text>
  <line x1="500" y1="392" x2="500" y2="420" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="415" y="422" width="170" height="32" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="500" y="443" text-anchor="middle" fill="#0056b3" font-size="12">融合热度因子</text>
  <line x1="500" y1="454" x2="500" y2="480" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <rect x="415" y="482" width="170" height="32" rx="6" fill="#e8f0fe" stroke="#007bff" stroke-width="1.5"/>
  <text x="500" y="503" text-anchor="middle" fill="#0056b3" font-size="12">按综合评分排序</text>
  <line x1="500" y1="514" x2="500" y2="542" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <polygon points="500,548 555,580 500,612 445,580" fill="#fff3cd" stroke="#856404" stroke-width="1.5"/>
  <text x="500" y="578" text-anchor="middle" fill="#856404" font-size="11">取Top-N</text>
  <text x="470" y="594" text-anchor="middle" fill="#856404" font-size="9">(5条)</text>

  <line x1="500" y1="612" x2="500" y2="645" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="440" y="648" width="120" height="32" rx="6" fill="#d4edda" stroke="#28a745" stroke-width="1.5"/>
  <text x="500" y="669" text-anchor="middle" fill="#155724" font-size="12">返回推荐列表</text>
  <line x1="500" y1="680" x2="500" y2="708" stroke="#007bff" stroke-width="1.5" marker-end="url(#a)"/>

  <ellipse cx="500" cy="728" rx="50" ry="16" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="500" y="733" text-anchor="middle" fill="#155724" font-size="12" font-weight="bold">结　束</text>
</svg>