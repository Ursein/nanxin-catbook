<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 800" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#cdd6f4"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f38ba8"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#a6e3a1"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#89b4fa"/>
    </marker>
    <marker id="arrow-yellow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#f9e2af"/>
    </marker>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="850" height="800" fill="#1e1e2e" rx="12"/>
  <rect x="5" y="5" width="840" height="790" fill="none" stroke="#313244" stroke-width="1" rx="10"/>

  <!-- Title -->
  <text x="425" y="36" text-anchor="middle" fill="#cdd6f4" font-size="16" font-weight="700" filter="url(#glow)">M4 照片管理 · Photo Management</text>
  <line x1="140" y1="48" x2="710" y2="48" stroke="#45475a" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- SUB-FLOW 1: UPLOAD PHOTO (y: 60–310)                         -->
  <!-- ============================================================ -->

  <!-- Section header -->
  <rect x="25" y="62" width="180" height="22" fill="#89b4fa" rx="4" opacity="0.15"/>
  <text x="115" y="77" text-anchor="middle" fill="#89b4fa" font-size="11" font-weight="600">① 上传照片 · Upload</text>

  <!-- START -->
  <ellipse cx="60" cy="115" rx="34" ry="14" fill="#45475a" stroke="#a6e3a1" stroke-width="1.8"/>
  <text x="60" y="119" text-anchor="middle" fill="#a6e3a1" font-size="10" font-weight="700">START</text>

  <!-- POST /cats/{id}/photos -->
  <rect x="120" y="99" width="170" height="32" fill="#313244" stroke="#89b4fa" stroke-width="1.6" rx="6"/>
  <text x="205" y="112" text-anchor="middle" fill="#89b4fa" font-size="10" font-weight="600">POST /cats/{id}/photos</text>
  <text x="205" y="124" text-anchor="middle" fill="#6c7086" font-size="8">请求上传接口</text>

  <!-- Validate -->
  <rect x="330" y="99" width="174" height="32" fill="#313244" stroke="#f9e2af" stroke-width="1.6" rx="6"/>
  <text x="417" y="112" text-anchor="middle" fill="#f9e2af" font-size="10" font-weight="600">校验文件格式</text>
  <text x="417" y="124" text-anchor="middle" fill="#6c7086" font-size="8">jpg/png, ≤10MB</text>

  <!-- Diamond: valid? -->
  <polygon points="555,115 583,131 555,147 527,131" fill="#313244" stroke="#f9e2af" stroke-width="1.6"/>
  <text x="555" y="134" text-anchor="middle" fill="#f9e2af" font-size="9" font-weight="600">valid?</text>

  <!-- Yes arrow (down) -->
  <line x1="555" y1="147" x2="555" y2="180" stroke="#a6e3a1" stroke-width="1.4" marker-end="url(#arrow-green)"/>
  <text x="568" y="166" fill="#a6e3a1" font-size="9" font-weight="600">是</text>

  <!-- No arrow (right → 400) -->
  <line x1="583" y1="131" x2="640" y2="131" stroke="#f38ba8" stroke-width="1.4" marker-end="url(#arrow-red)"/>
  <text x="600" y="124" fill="#f38ba8" font-size="9" font-weight="600">否</text>

  <!-- 400 Response -->
  <rect x="646" y="115" width="100" height="32" fill="#313244" stroke="#f38ba8" stroke-width="1.6" rx="6"/>
  <text x="696" y="128" text-anchor="middle" fill="#f38ba8" font-size="10" font-weight="600">返回 400</text>
  <text x="696" y="140" text-anchor="middle" fill="#6c7086" font-size="8">格式/大小不符</text>

  <!-- Save to disk (yes branch) -->
  <rect x="455" y="186" width="200" height="32" fill="#313244" stroke="#a6e3a1" stroke-width="1.6" rx="6"/>
  <text x="555" y="199" text-anchor="middle" fill="#a6e3a1" font-size="10" font-weight="600">保存文件到磁盘</text>
  <text x="555" y="211" text-anchor="middle" fill="#6c7086" font-size="8">store/upload/{id}.{ext}</text>

  <line x1="555" y1="218" x2="555" y2="246" stroke="#cdd6f4" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Create photo record -->
  <rect x="455" y="252" width="200" height="32" fill="#313244" stroke="#89b4fa" stroke-width="1.6" rx="6"/>
  <text x="555" y="265" text-anchor="middle" fill="#89b4fa" font-size="10" font-weight="600">创建 photo 记录</text>
  <text x="555" y="277" text-anchor="middle" fill="#6c7086" font-size="8">status = PENDING</text>

  <line x1="555" y1="284" x2="555" y2="308" stroke="#cdd6f4" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Return -->
  <ellipse cx="555" cy="320" rx="46" ry="14" fill="#45475a" stroke="#a6e3a1" stroke-width="1.8"/>
  <text x="555" y="317" text-anchor="middle" fill="#a6e3a1" font-size="8" font-weight="700">返回照片信息</text>
  <text x="555" y="330" text-anchor="middle" fill="#6c7086" font-size="7">200 OK</text>


  <!-- ============================================================ -->
  <!-- SUB-FLOW 2: APPROVE / REJECT PHOTO (y: 340–560)              -->
  <!-- ============================================================ -->

  <rect x="25" y="352" width="218" height="22" fill="#a6e3a1" rx="4" opacity="0.15"/>
  <text x="134" y="367" text-anchor="middle" fill="#a6e3a1" font-size="11" font-weight="600">② 审核照片 · Approve / Reject</text>

  <!-- START -->
  <ellipse cx="60" cy="405" rx="34" ry="14" fill="#45475a" stroke="#a6e3a1" stroke-width="1.8"/>
  <text x="60" y="409" text-anchor="middle" fill="#a6e3a1" font-size="10" font-weight="700">START</text>

  <line x1="94" y1="405" x2="120" y2="405" stroke="#cdd6f4" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- PUT approve|reject -->
  <rect x="125" y="389" width="200" height="32" fill="#313244" stroke="#89b4fa" stroke-width="1.6" rx="6"/>
  <text x="225" y="402" text-anchor="middle" fill="#89b4fa" font-size="10" font-weight="600">PUT /photos/{id}/approve|reject</text>
  <text x="225" y="414" text-anchor="middle" fill="#6c7086" font-size="8">审核接口</text>

  <line x1="325" y1="405" x2="358" y2="405" stroke="#cdd6f4" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Check ADMIN -->
  <rect x="363" y="389" width="158" height="32" fill="#313244" stroke="#f9e2af" stroke-width="1.6" rx="6"/>
  <text x="442" y="402" text-anchor="middle" fill="#f9e2af" font-size="10" font-weight="600">校验 ADMIN 权限</text>
  <text x="442" y="414" text-anchor="middle" fill="#6c7086" font-size="8">RBAC 鉴权</text>

  <line x1="521" y1="405" x2="555" y2="405" stroke="#cdd6f4" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Diamond: is admin? -->
  <polygon points="555,391 583,405 555,419 527,405" fill="#313244" stroke="#f9e2af" stroke-width="1.6"/>
  <text x="555" y="409" text-anchor="middle" fill="#f9e2af" font-size="9" font-weight="600">admin?</text>

  <!-- No (right → 403) -->
  <line x1="583" y1="405" x2="640" y2="405" stroke="#f38ba8" stroke-width="1.4" marker-end="url(#arrow-red)"/>
  <text x="600" y="398" fill="#f38ba8" font-size="9" font-weight="600">否</text>

  <rect x="646" y="389" width="100" height="32" fill="#313244" stroke="#f38ba8" stroke-width="1.6" rx="6"/>
  <text x="696" y="402" text-anchor="middle" fill="#f38ba8" font-size="10" font-weight="600">返回 403</text>
  <text x="696" y="414" text-anchor="middle" fill="#6c7086" font-size="8">无权限</text>

  <!-- Yes (down) -->
  <line x1="555" y1="419" x2="555" y2="458" stroke="#a6e3a1" stroke-width="1.4" marker-end="url(#arrow-green)"/>
  <text x="568" y="438" fill="#a6e3a1" font-size="9" font-weight="600">是</text>

  <!-- Update status -->
  <rect x="455" y="464" width="200" height="32" fill="#313244" stroke="#a6e3a1" stroke-width="1.6" rx="6"/>
  <text x="555" y="477" text-anchor="middle" fill="#a6e3a1" font-size="10" font-weight="600">更新 status</text>
  <text x="555" y="489" text-anchor="middle" fill="#6c7086" font-size="8">APPROVED / REJECTED</text>

  <line x1="555" y1="496" x2="555" y2="522" stroke="#cdd6f4" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Record reviewer -->
  <rect x="455" y="528" width="200" height="32" fill="#313244" stroke="#89b4fa" stroke-width="1.6" rx="6"/>
  <text x="555" y="541" text-anchor="middle" fill="#89b4fa" font-size="10" font-weight="600">记录 reviewer_id</text>
  <text x="555" y="553" text-anchor="middle" fill="#6c7086" font-size="8">审核人关联</text>

  <line x1="555" y1="560" x2="555" y2="585" stroke="#cdd6f4" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Return -->
  <ellipse cx="555" cy="597" rx="46" ry="14" fill="#45475a" stroke="#a6e3a1" stroke-width="1.8"/>
  <text x="555" y="594" text-anchor="middle" fill="#a6e3a1" font-size="8" font-weight="700">返回审核结果</text>
  <text x="555" y="607" text-anchor="middle" fill="#6c7086" font-size="7">200 OK</text>


  <!-- ============================================================ -->
  <!-- SUB-FLOW 3: LIKE PHOTO (y: 620–780)                          -->
  <!-- ============================================================ -->

  <rect x="25" y="622" width="180" height="22" fill="#f9e2af" rx="4" opacity="0.15"/>
  <text x="115" y="637" text-anchor="middle" fill="#f9e2af" font-size="11" font-weight="600">③ 点赞照片 · Like</text>

  <!-- START -->
  <ellipse cx="60" cy="678" rx="34" ry="14" fill="#45475a" stroke="#a6e3a1" stroke-width="1.8"/>
  <text x="60" y="682" text-anchor="middle" fill="#a6e3a1" font-size="10" font-weight="700">START</text>

  <line x1="94" y1="678" x2="120" y2="678" stroke="#cdd6f4" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- POST like -->
  <rect x="125" y="662" width="178" height="32" fill="#313244" stroke="#89b4fa" stroke-width="1.6" rx="6"/>
  <text x="214" y="675" text-anchor="middle" fill="#89b4fa" font-size="10" font-weight="600">POST /photos/{id}/like</text>
  <text x="214" y="687" text-anchor="middle" fill="#6c7086" font-size="8">点赞接口</text>

  <line x1="303" y1="678" x2="330" y2="678" stroke="#cdd6f4" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Check login -->
  <rect x="335" y="662" width="140" height="32" fill="#313244" stroke="#f9e2af" stroke-width="1.6" rx="6"/>
  <text x="405" y="675" text-anchor="middle" fill="#f9e2af" font-size="10" font-weight="600">校验登录状态</text>
  <text x="405" y="687" text-anchor="middle" fill="#6c7086" font-size="8">Session / Token</text>

  <line x1="475" y1="678" x2="528" y2="678" stroke="#cdd6f4" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Check unique constraint -->
  <rect x="345" y="722" width="182" height="32" fill="#313244" stroke="#f9e2af" stroke-width="1.6" rx="6"/>
  <text x="436" y="735" text-anchor="middle" fill="#f9e2af" font-size="10" font-weight="600">检查唯一约束</text>
  <text x="436" y="747" text-anchor="middle" fill="#6c7086" font-size="8">user_id + photo_id 唯一</text>

  <!-- Path from login to constraint check -->
  <path d="M530,678 Q690,678 690,700 Q690,722 532,738" fill="none" stroke="#cdd6f4" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Diamond: already liked? -->
  <polygon points="436,770 464,784 436,798 408,784" fill="#313244" stroke="#f9e2af" stroke-width="1.6"/>
  <text x="436" y="788" text-anchor="middle" fill="#f9e2af" font-size="9" font-weight="600">liked?</text>

  <line x1="408" y1="784" x2="240" y2="784" stroke="#f38ba8" stroke-width="1.4" marker-end="url(#arrow-red)"/>
  <text x="340" y="777" fill="#f38ba8" font-size="9" font-weight="600">已存在</text>

  <!-- Already liked error -->
  <rect x="100" y="768" width="130" height="32" fill="#313244" stroke="#f38ba8" stroke-width="1.6" rx="6"/>
  <text x="165" y="781" text-anchor="middle" fill="#f38ba8" font-size="10" font-weight="600">返回 409</text>
  <text x="165" y="793" text-anchor="middle" fill="#6c7086" font-size="8">已点赞</text>

  <!-- Not yet liked (down) -->
  <text x="450" y="803" fill="#a6e3a1" font-size="9" font-weight="600">否</text>

  <!-- Insert like record -->
  <rect x="510" y="770" width="170" height="28" fill="#313244" stroke="#a6e3a1" stroke-width="1.6" rx="6"/>
  <text x="595" y="788" text-anchor="middle" fill="#a6e3a1" font-size="9" font-weight="600">插入点赞记录</text>

  <line x1="680" y1="784" x2="712" y2="784" stroke="#cdd6f4" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- Increase count -->
  <rect x="717" y="746" width="118" height="28" fill="#313244" stroke="#89b4fa" stroke-width="1.6" rx="6"/>
  <text x="776" y="756" text-anchor="middle" fill="#89b4fa" font-size="9" font-weight="600">like_count++</text>
  <text x="776" y="767" text-anchor="middle" fill="#6c7086" font-size="7">INCR</text>

  <path d="M776,774 Q776,800 620,800 Q620,800 620,815" fill="none" stroke="#cdd6f4" stroke-width="1.4" marker-end="url(#arrow)"/>

  <text x="760" y="800" fill="#cdd6f4" font-size="7">返回结果</text>


  <!-- ============================================================ -->
  <!-- LEGEND                                                       -->
  <!-- ============================================================ -->

  <rect x="640" y="58" width="180" height="100" fill="#181825" stroke="#45475a" stroke-width="1" rx="6"/>
  <text x="730" y="74" text-anchor="middle" fill="#cdd6f4" font-size="9" font-weight="600">图例 · Legend</text>

  <rect x="652" y="82" width="12" height="12" fill="#313244" stroke="#89b4fa" stroke-width="1.5" rx="3"/>
  <text x="672" y="92" fill="#cdd6f4" font-size="8">接口请求</text>

  <rect x="652" y="100" width="12" height="12" fill="#313244" stroke="#f9e2af" stroke-width="1.5" rx="3"/>
  <text x="672" y="110" fill="#cdd6f4" font-size="8">校验 / 约束</text>

  <rect x="652" y="118" width="12" height="12" fill="#313244" stroke="#a6e3a1" stroke-width="1.5" rx="3"/>
  <text x="672" y="128" fill="#cdd6f4" font-size="8">业务操作</text>

  <rect x="652" y="136" width="12" height="12" fill="#45475a" stroke="#f38ba8" stroke-width="1.5" rx="3"/>
  <text x="672" y="146" fill="#cdd6f4" font-size="8">错误 / 拒绝</text>

</svg>