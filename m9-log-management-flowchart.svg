<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 750" width="750" height="750">
  

  <!-- Background -->
  <rect width="750" height="750" fill="#ffffff"/>
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="0" x2="750" y2="0"/><line x1="0" y1="50" x2="750" y2="50"/>
    <line x1="0" y1="100" x2="750" y2="100"/><line x1="0" y1="150" x2="750" y2="150"/>
    <line x1="0" y1="200" x2="750" y2="200"/><line x1="0" y1="250" x2="750" y2="250"/>
    <line x1="0" y1="300" x2="750" y2="300"/><line x1="0" y1="350" x2="750" y2="350"/>
    <line x1="0" y1="400" x2="750" y2="400"/><line x1="0" y1="450" x2="750" y2="450"/>
    <line x1="0" y1="500" x2="750" y2="500"/><line x1="0" y1="550" x2="750" y2="550"/>
    <line x1="0" y1="600" x2="750" y2="600"/><line x1="0" y1="650" x2="750" y2="650"/>
    <line x1="0" y1="700" x2="750" y2="700"/>
  </g>

  <!-- Title -->
  <text x="375" y="36" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="700" fill="#2563eb" filter="url(#glowBlue)">M9 日志管理 (Log Management)</text>

  <!-- ====== NODES ====== -->

  <!-- 0. START -->
  <ellipse cx="375" cy="68" rx="42" ry="18" fill="none" stroke="#a6e3a1" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="73" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#16a34a">START</text>

  <!-- Arrow 0→1 -->
  <line x1="375" y1="86" x2="375" y2="108" stroke="#6c7086" stroke-width="1.8" marker-end="url(#arrowGray)"/>

  <!-- 1. 用户操作 -->
  <rect x="280" y="110" width="190" height="40" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="135" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#2563eb">👤 用户操作</text>

  <!-- Arrow 1→2 -->
  <line x1="375" y1="150" x2="375" y2="172" stroke="#6c7086" stroke-width="1.8" marker-end="url(#arrowGray)"/>

  <!-- 2. 拦截器捕获请求 -->
  <rect x="260" y="174" width="230" height="40" rx="8" fill="#1a1a2e" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="199" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#2563eb">🛑 拦截器捕获请求</text>

  <!-- Arrow 2→3 -->
  <line x1="375" y1="214" x2="375" y2="236" stroke="#6c7086" stroke-width="1.8" marker-end="url(#arrowGray)"/>

  <!-- 3. 记录请求信息 -->
  <rect x="245" y="238" width="260" height="40" rx="8" fill="#1a1a2e" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="256" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#c0caf5">📝 记录请求信息</text>
  <text x="375" y="271" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6c7086">method / url / params / ip / userId</text>

  <!-- Arrow 3→4 -->
  <line x1="375" y1="278" x2="375" y2="300" stroke="#6c7086" stroke-width="1.8" marker-end="url(#arrowGray)"/>

  <!-- 4. 执行业务 -->
  <rect x="280" y="302" width="190" height="40" rx="8" fill="#1a1a2e" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="327" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#2563eb">⚙️ 执行业务</text>

  <!-- Arrow 4→5 -->
  <line x1="375" y1="342" x2="375" y2="364" stroke="#6c7086" stroke-width="1.8" marker-end="url(#arrowGray)"/>

  <!-- 5. 记录响应结果 -->
  <rect x="245" y="366" width="260" height="40" rx="8" fill="#1a1a2e" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="384" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#c0caf5">📋 记录响应结果</text>
  <text x="375" y="399" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6c7086">status / response time</text>

  <!-- Arrow 5→6 -->
  <line x1="375" y1="406" x2="375" y2="428" stroke="#6c7086" stroke-width="1.8" marker-end="url(#arrowGray)"/>

  <!-- 6. 异步写入log表 -->
  <rect x="260" y="430" width="230" height="40" rx="8" fill="#1a1a2e" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="455" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#2563eb">⚡ 异步写入 log 表</text>

  <!-- Arrow 6→7 -->
  <line x1="375" y1="470" x2="375" y2="492" stroke="#6c7086" stroke-width="1.8" marker-end="url(#arrowGray)"/>

  <!-- 7. Decision: 需要审计? -->
  <polygon points="375,494 435,530 375,566 315,530" fill="#1a1a2e" stroke="#f9e2af" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="528" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#f9e2af">需要审计?</text>
  <text x="375" y="540" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#6c7086">Need Audit?</text>

  <!-- Arrow 7→8 (YES - right) -->
  <line x1="435" y1="530" x2="520" y2="530" stroke="#f9e2af" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <text x="475" y="522" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#f9e2af">是</text>

  <!-- 8. 标记审计日志到独立表 (YES branch) -->
  <rect x="522" y="508" width="200" height="44" rx="8" fill="#1a1a2e" stroke="#f9e2af" stroke-width="2" filter="url(#shadow)"/>
  <text x="622" y="528" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#f9e2af">📌 标记审计日志</text>
  <text x="622" y="543" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6c7086">写入独立审计表</text>

  <!-- Arrow 7→9 (NO - left) -->
  <line x1="315" y1="530" x2="230" y2="530" stroke="#a6e3a1" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="275" y="522" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#16a34a">否</text>

  <!-- 9. 保留常规日志 (NO branch) -->
  <rect x="24" y="508" width="204" height="44" rx="8" fill="#1a1a2e" stroke="#a6e3a1" stroke-width="2" filter="url(#shadow)"/>
  <text x="126" y="528" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#16a34a">📄 保留常规日志</text>
  <text x="126" y="543" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6c7086">写入常规日志表</text>

  <!-- Arrow from 8 down to merge -->
  <line x1="622" y1="552" x2="622" y2="610" stroke="#6c7086" stroke-width="1.8"/>
  <line x1="622" y1="610" x2="375" y2="610" stroke="#6c7086" stroke-width="1.8"/>
  <line x1="375" y1="610" x2="375" y2="628" stroke="#6c7086" stroke-width="1.8" marker-end="url(#arrowGray)"/>

  <!-- Arrow from 9 down to merge -->
  <line x1="126" y1="552" x2="126" y2="610" stroke="#6c7086" stroke-width="1.8"/>
  <line x1="126" y1="610" x2="375" y2="610" stroke="#6c7086" stroke-width="1.8"/>

  <!-- 10. 自动清理 -->
  <rect x="245" y="630" width="260" height="40" rx="8" fill="#1a1a2e" stroke="#a6e3a1" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="648" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#16a34a">🧹 自动清理（30天前日志）</text>
  <text x="375" y="663" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#6c7086">Auto cleanup: logs &gt; 30 days</text>

  <!-- Arrow 10→11 -->
  <line x1="375" y1="670" x2="375" y2="700" stroke="#6c7086" stroke-width="1.8" marker-end="url(#arrowGray)"/>

  <!-- 11. END -->
  <ellipse cx="375" cy="720" rx="42" ry="18" fill="none" stroke="#a6e3a1" stroke-width="2" filter="url(#shadow)"/>
  <text x="375" y="725" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#16a34a">END</text>

  <!-- Module label bottom-right -->
  <text x="738" y="740" text-anchor="end" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#565a73" opacity="0.6">M9 · v1.0</text>
</svg>